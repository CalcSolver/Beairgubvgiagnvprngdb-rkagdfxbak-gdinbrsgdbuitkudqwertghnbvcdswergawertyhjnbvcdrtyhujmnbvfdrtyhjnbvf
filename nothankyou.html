<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 Not Found</title>
    <link id="fav" rel="shortcut icon" type="image/png" href="https://www.google.com/favicon.ico">
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <style>
        :root {
            --theme-bg: #0b0b18;
            --theme-accent: #7c3aed;
            --theme-accent-2: #4f46e5;
            --theme-muted: #8078a8;
            --theme-accent-10: rgba(124,58,237,0.1);
            --theme-accent-40: rgba(124,58,237,0.4);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: sans-serif; }
        
        /* DECOY */
        #decoy-body { background: #fff; color: #000; height: 100vh; display: flex; align-items: center; justify-content: center; z-index: 10001; position: relative; }
        
        /* LOGIN & CARDS */
        #login-overlay { display: none; position: fixed; inset: 0; z-index: 10000; background: var(--theme-bg); align-items: center; justify-content: center; }
        .card { width: 90%; max-width: 420px; padding: 40px; background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 20px; backdrop-filter: blur(20px); text-align: center; color: #fff; }
        input, textarea { width: 100%; padding: 12px; margin-bottom: 10px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 10px; color: #fff; outline: none; }
        .btn { width: 100%; padding: 12px; border: none; border-radius: 10px; background: linear-gradient(135deg, var(--theme-accent), var(--theme-accent-2)); color: white; font-weight: 700; cursor: pointer; }
        .btn:disabled { opacity: 0.5; }

        /* PORTAL */
        #portal { display: none; position: fixed; inset: 0; flex-direction: column; background: var(--theme-bg); z-index: 999; }
        #nav { height: 60px; background: rgba(0,0,0,0.4); border-bottom: 1px solid rgba(255,255,255,0.05); display: flex; align-items: center; padding: 0 20px; gap: 10px; }
        .nav-btn { padding: 8px 15px; border-radius: 8px; border: none; background: transparent; color: var(--theme-muted); cursor: pointer; font-size: 13px; }
        .nav-btn.on { background: var(--theme-accent-10); color: var(--theme-accent); }

        /* CHAT */
        #chat-box { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; }
        .msg { padding: 10px; border-radius: 10px; background: rgba(255,255,255,0.05); color: #fff; max-width: 80%; position: relative; }
        .msg.me { align-self: flex-end; background: var(--theme-accent-10); border: 1px solid var(--theme-accent-40); }
        .del-btn { color: #ff4b4b; font-size: 10px; cursor: pointer; margin-left: 10px; display: none; }
        
        .view { display: none; width: 100%; height: 100%; }
        .view.on { display: flex; flex-direction: column; }
        iframe { width: 100%; height: 100%; border: none; }
    </style>
</head>
<body>

    <div id="decoy-body">
        <div style="font-size:24px; font-weight:500;">404 Not Found</div>
    </div>

    <div id="login-overlay">
        <div class="card">
            <div id="login-form">
                <h2>Authorization</h2><br>
                <input type="email" id="email" placeholder="Email">
                <input type="password" id="pass" placeholder="Password">
                <button class="btn" id="login-btn">Login</button>
                <p style="font-size:12px; margin-top:15px; cursor:pointer;" onclick="toggleAuth(true)">Request Access</p>
            </div>
            <div id="request-form" style="display:none;">
                <h2>Request Profile</h2><br>
                <input type="text" id="req-user" placeholder="Username">
                <input type="email" id="req-email" placeholder="Email">
                <input type="password" id="req-pass" placeholder="Password">
                <button class="btn" id="req-btn">Send Request</button>
                <p id="cooldown" style="color:#ff4b4b; font-size:11px; margin-top:5px;"></p>
                <p style="font-size:12px; margin-top:15px; cursor:pointer;" onclick="toggleAuth(false)">Back</p>
            </div>
        </div>
    </div>

    <div id="portal">
        <div id="nav">
            <b style="color:var(--theme-accent)">M-TOOL</b>
            <button class="nav-btn on" onclick="showTab('home', this)">Home</button>
            <button class="nav-btn" onclick="showTab('chat', this)">Chat</button>
            <button id="admin-nav" class="nav-btn" style="display:none; color:gold;" onclick="showTab('admin', this)">Admin</button>
            <div style="flex:1"></div>
            <button class="nav-btn" style="color:#ff4b4b" id="logout-btn">Logout</button>
        </div>
        
        <div id="v-home" class="view on"><iframe id="f-home"></iframe></div>
        
        <div id="v-chat" class="view">
            <div id="chat-box"></div>
            <div style="padding:20px; display:flex; gap:10px; background:rgba(0,0,0,0.2);">
                <input type="text" id="chat-input" placeholder="Message..." style="margin:0">
                <button class="btn" style="width:80px" id="send-btn">Send</button>
            </div>
        </div>

        <div id="v-admin" class="view" style="padding:30px; color:#fff; overflow-y:auto;">
            <h3>Active Users (Devices)</h3><hr><br>
            <div id="online-list"></div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, doc, getDoc, setDoc, deleteDoc, query, where, onSnapshot, serverTimestamp, orderBy, limit } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyD5TALVIdPm5P8RuKjINsOmKW1XrK53u1Q",
            authDomain: "testing-12bc9.firebaseapp.com",
            projectId: "testing-12bc9",
            storageBucket: "testing-12bc9.firebasestorage.app",
            messagingSenderId: "626782607651",
            appId: "1:626782607651:web:c5980863cef82d904a5496"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const adminEmail = "hjass2865@gmail.com";

        emailjs.init("6iGADKihYbPC4ecb_");

        const getDevice = () => {
            const ua = navigator.userAgent;
            if (/iPhone|iPad/i.test(ua)) return "iPhone";
            if (/Android/i.test(ua)) return "Android";
            if (/Windows/i.test(ua)) return "Windows";
            return "PC";
        };

        // --- CHAT LOGIC ---
        const startChat = () => {
            const q = query(collection(db, "messages"), orderBy("timestamp", "asc"), limit(50));
            onSnapshot(q, (snap) => {
                const box = document.getElementById('chat-box');
                box.innerHTML = "";
                snap.forEach(d => {
                    const data = d.data();
                    const isMe = auth.currentUser && data.uid === auth.currentUser.uid;
                    const isAdmin = auth.currentUser && auth.currentUser.email === adminEmail;
                    
                    const div = document.createElement('div');
                    div.className = `msg ${isMe ? 'me' : ''}`;
                    div.innerHTML = `
                        <small style="color:var(--theme-accent)">${data.user}</small><br>${data.text}
                        ${isAdmin ? `<span class="del-btn" onclick="window.deleteMsg('${d.id}')" style="display:inline">[Delete]</span>` : ''}
                    `;
                    box.appendChild(div);
                });
                box.scrollTop = box.scrollHeight;
            });
        };

        window.deleteMsg = async (id) => { await deleteDoc(doc(db, "messages", id)); };

        document.getElementById('send-btn').onclick = async () => {
            const txt = document.getElementById('chat-input').value;
            if(!txt) return;
            await addDoc(collection(db, "messages"), {
                text: txt,
                user: auth.currentUser.email.split('@')[0],
                uid: auth.currentUser.uid,
                timestamp: serverTimestamp()
            });
            document.getElementById('chat-input').value = "";
        };

        // --- LOGIN & ADMIN ---
        document.getElementById('login-btn').onclick = async () => {
            const email = document.getElementById('email').value;
            try {
                const cred = await signInWithEmailAndPassword(auth, email, document.getElementById('pass').value);
                await setDoc(doc(db, "active_sessions", cred.user.uid), { 
                    username: email.split('@')[0], 
                    isOnline: true, 
                    device: getDevice() 
                }, { merge: true });
                
                document.getElementById('login-overlay').style.display = 'none';
                document.getElementById('portal').style.display = 'flex';
                document.getElementById('f-home').src = "https://calcsolver.github.io/Beairgubvgiagnvprngdb-rkagdfxbak-gdinbrsgdbuitkud/";
                
                startChat();
                if(email === adminEmail) {
                    document.getElementById('admin-nav').style.display = 'block';
                    onSnapshot(query(collection(db, "active_sessions"), where("isOnline", "==", true)), (snap) => {
                        const list = document.getElementById('online-list');
                        list.innerHTML = "";
                        snap.forEach(u => {
                            list.innerHTML += `<div style="margin-bottom:10px;">🟢 ${u.data().username} (${u.data().device})</div>`;
                        });
                    });
                }
            } catch (e) { alert("Access Denied"); }
        };

        // --- REQUEST WITH ANTI-SPAM ---
        document.getElementById('req-btn').onclick = async () => {
            const last = localStorage.getItem('last_req');
            if(last && Date.now() - last < 60000) return alert("Wait 60s");
            
            const user = document.getElementById('req-user').value;
            const email = document.getElementById('req-email').value;
            const pass = document.getElementById('req-pass').value;
            
            await addDoc(collection(db, "requests"), { user, email, pass, device: getDevice() });
            emailjs.send("service_06y4hgi", "template_56l2irz", { username: user, user_email: email, user_pass: pass, message: "Friend req enabled" });
            
            localStorage.setItem('last_req', Date.now());
            alert("Sent!");
        };

        document.getElementById('logout-btn').onclick = async () => {
            await setDoc(doc(db, "active_sessions", auth.currentUser.uid), { isOnline: false }, { merge: true });
            await signOut(auth); location.reload();
        };
    </script>

    <script>
        document.onkeydown = (e) => { if(e.ctrlKey && e.key === 'x') { document.getElementById('decoy-body').style.display = 'none'; document.getElementById('login-overlay').style.display = 'flex'; } };
        function toggleAuth(req) { document.getElementById('login-form').style.display = req ? 'none' : 'block'; document.getElementById('request-form').style.display = req ? 'block' : 'none'; }
        function showTab(id, btn) {
            document.querySelectorAll('.view').forEach(v => v.classList.remove('on'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('on'));
            document.getElementById('v-' + id).classList.add('on');
            btn.classList.add('on');
        }
    </script>
</body>
</html>
