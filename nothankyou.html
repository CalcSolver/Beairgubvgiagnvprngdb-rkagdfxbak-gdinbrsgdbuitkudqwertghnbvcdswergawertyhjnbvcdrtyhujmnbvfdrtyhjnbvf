<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 Not Found</title>
    <link id="fav" rel="shortcut icon" type="image/png" href="https://www.google.com/favicon.ico">
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <style>
        :root {
            --theme-bg: #0b0b18;
            --theme-accent: #7c3aed;
            --theme-accent-2: #4f46e5;
            --theme-glow-1: rgba(124,58,237,0.15);
            --theme-glow-2: rgba(79,70,229,0.1);
            --theme-muted: #8078a8;
            --theme-muted-2: #6058a0;
            --theme-accent-10: rgba(124,58,237,0.1);
            --theme-accent-40: rgba(124,58,237,0.4);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, system-ui, sans-serif; }
        
        /* 404 DECOY */
        #decoy-body { background: #fff; color: #000; height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 10001; position: relative; }
        .n-text { font-size: 24px; font-weight: 500; border-right: 1px solid #ccc; padding-right: 20px; margin-right: 20px; }
        .m-text { font-size: 14px; }

        /* LOGIN & REQUEST CARDS */
        #login-overlay { display: none; position: fixed; inset: 0; z-index: 10000; background: var(--theme-bg); align-items: center; justify-content: center; }
        .login-card { width: 90%; max-width: 420px; padding: 45px; background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 28px; backdrop-filter: blur(30px); text-align: center; color: #e5e3ff; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5); }
        input, textarea { width: 100%; padding: 15px; margin-bottom: 15px; background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08); border-radius: 14px; color: #fff; outline: none; }
        .submit-btn { width: 100%; padding: 15px; border: none; border-radius: 14px; background: linear-gradient(135deg, var(--theme-accent), var(--theme-accent-2)); color: white; font-weight: 700; cursor: pointer; transition: transform 0.2s; }
        .submit-btn:active { transform: scale(0.98); }

        /* PORTAL UI */
        #portal { display: none; position: fixed; inset: 0; flex-direction: column; background: var(--theme-bg); z-index: 999; }
        #nav { height: 65px; background: rgba(0,0,0,0.5); border-bottom: 1px solid rgba(255,255,255,0.06); display: flex; align-items: center; padding: 0 25px; gap: 10px; }
        .nav-btn { padding: 9px 16px; border-radius: 10px; border: 1px solid transparent; background: transparent; color: var(--theme-muted); cursor: pointer; font-size: 13px; font-weight: 600; }
        .nav-btn.on { background: var(--theme-accent-10); color: var(--theme-accent); border-color: var(--theme-accent-40); }
        
        .view { display: none; width: 100%; height: 100%; overflow: hidden; }
        .view.on { display: flex; flex-direction: column; }
        iframe { width: 100%; height: 100%; border: none; }

        /* CHAT UI */
        #chat-container { flex: 1; display: flex; flex-direction: column; padding: 20px; background: rgba(0,0,0,0.2); }
        #chat-box { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; margin-bottom: 20px; padding: 10px; }
        .msg { padding: 10px 15px; border-radius: 12px; background: rgba(255,255,255,0.05); color: #fff; max-width: 70%; align-self: flex-start; }
        .msg.me { align-self: flex-end; background: var(--theme-accent-10); border: 1px solid var(--theme-accent-40); }
        .msg-user { font-size: 10px; color: var(--theme-accent); font-weight: 800; display: block; margin-bottom: 2px; }

        /* ADMIN PANEL */
        .admin-section { padding: 20px; background: rgba(255,255,255,0.02); border-radius: 15px; margin-bottom: 20px; border: 1px solid rgba(255,255,255,0.05); }
    </style>
</head>
<body>

    <div id="decoy-body">
        <div><span class="n-text">404</span><span class="m-text">Not Found</span></div>
    </div>

    <div id="login-overlay">
        <div class="login-card">
            <h1 style="margin-bottom:10px;">Authorization</h1>
            <div id="login-form">
                <input type="email" id="email" placeholder="Email">
                <input type="password" id="pass" placeholder="Password">
                <button class="submit-btn" id="login-btn">Secure Login</button>
                <p style="font-size:12px; margin-top:15px; cursor:pointer; color:var(--theme-muted);" onclick="toggleAuth(true)">Request Access</p>
            </div>
            <div id="request-form" style="display:none;">
                <input type="text" id="req-user" placeholder="Username">
                <input type="email" id="req-email" placeholder="Email">
                <input type="password" id="req-pass" placeholder="Desired Password">
                <textarea id="req-note" rows="2" placeholder="Note to Admin (Optional)"></textarea>
                <button class="submit-btn" id="req-btn">Send Access Request</button>
                <p style="font-size:12px; margin-top:15px; cursor:pointer; color:var(--theme-muted);" onclick="toggleAuth(false)">Back to Login</p>
            </div>
        </div>
    </div>

    <div id="portal">
        <div id="nav">
            <div style="font-weight: 900; color: var(--theme-accent); margin-right: 20px;">M-TOOL</div>
            <button class="nav-btn on" onclick="showTab('home', this)">Home</button>
            <button class="nav-btn" onclick="showTab('chat', this)">Messages</button>
            <button class="nav-btn" onclick="showTab('games', this)">Games</button>
            <button id="admin-nav-btn" class="nav-btn" style="display:none; color:#fbbf24;" onclick="showTab('admin', this)">Admin</button>
            <div style="flex:1"></div>
            <div id="profile-display" style="color: var(--theme-accent); font-size: 11px; font-weight: 700; margin-right: 10px;">GUEST</div>
            <button class="nav-btn" style="color:#ff4b4b; border-color:rgba(255,75,75,0.2);" id="logout-btn">Log Out</button>
        </div>

        <div id="main" style="flex:1; overflow:hidden;">
            <div class="view on" id="v-home"><iframe id="f-home"></iframe></div>
            
            <div class="view" id="v-chat">
                <div id="chat-container">
                    <div id="chat-box"></div>
                    <div style="display:flex; gap:10px;">
                        <input type="text" id="chat-input" placeholder="Type a message..." style="margin:0;">
                        <button class="submit-btn" style="width:100px;" id="send-msg">Send</button>
                    </div>
                </div>
            </div>

            <div class="view" id="v-games"><iframe id="f-games"></iframe></div>

            <div class="view" id="v-admin" style="padding:40px; overflow-y:auto; color:#fff;">
                <h2>Admin Console</h2>
                <div class="admin-section">
                    <h3>Who is Online?</h3>
                    <div id="online-list" style="display:flex; gap:10px; flex-wrap:wrap; margin-top:10px;"></div>
                </div>
                <div class="admin-section">
                    <h3>Global Controls</h3>
                    <button class="submit-btn" style="width:auto; padding:10px 20px; background:#ef4444;" onclick="location.reload()">Force Reset</button>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, doc, getDoc, setDoc, query, where, onSnapshot, serverTimestamp, orderBy, limit } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyD5TALVIdPm5P8RuKjINsOmKW1XrK53u1Q",
            authDomain: "testing-12bc9.firebaseapp.com",
            projectId: "testing-12bc9",
            storageBucket: "testing-12bc9.firebasestorage.app",
            messagingSenderId: "626782607651",
            appId: "1:626782607651:web:c5980863cef82d904a5496"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const adminEmail = "hjass2865@gmail.com";

        emailjs.init("6iGADKihYbPC4ecb_");

        // --- CHAT SYSTEM ---
        const startChat = () => {
            const q = query(collection(db, "messages"), orderBy("timestamp", "asc"), limit(50));
            onSnapshot(q, (snap) => {
                const box = document.getElementById('chat-box');
                box.innerHTML = "";
                snap.forEach(d => {
                    const data = d.data();
                    const isMe = auth.currentUser && data.user === auth.currentUser.email.split('@')[0];
                    const div = document.createElement('div');
                    div.className = `msg ${isMe ? 'me' : ''}`;
                    div.innerHTML = `<span class="msg-user">${data.user}</span>${data.text}`;
                    box.appendChild(div);
                });
                box.scrollTop = box.scrollHeight;
            });
        };

        document.getElementById('send-msg').onclick = async () => {
            const val = document.getElementById('chat-input').value;
            if(!val || !auth.currentUser) return;
            await addDoc(collection(db, "messages"), {
                text: val,
                user: auth.currentUser.email.split('@')[0],
                timestamp: serverTimestamp()
            });
            document.getElementById('chat-input').value = "";
        };

        // --- MONITOR SYSTEM ---
        const startMonitor = () => {
            const q = query(collection(db, "active_sessions"), where("isOnline", "==", true));
            onSnapshot(q, (snap) => {
                const list = document.getElementById('online-list');
                list.innerHTML = "";
                snap.forEach(d => {
                    const el = document.createElement('div');
                    el.style.cssText = "padding:10px; background:rgba(124,58,237,0.1); border:1px solid var(--theme-accent); border-radius:10px; font-size:12px;";
                    el.innerHTML = `🟢 ${d.data().username}`;
                    list.appendChild(el);
                });
            });
        };

        // --- AUTH & SESSIONS ---
        document.getElementById('login-btn').onclick = async () => {
            const email = document.getElementById('email').value;
            const password = document.getElementById('pass').value;
            try {
                const userCred = await signInWithEmailAndPassword(auth, email, password);
                const uid = userCred.user.uid;
                const sessionRef = doc(db, "active_sessions", uid);

                let browserId = localStorage.getItem("browser_session_id") || Math.random().toString(36).substring(7);
                localStorage.setItem("browser_session_id", browserId);
                
                const snap = await getDoc(sessionRef);
                if (snap.exists() && snap.data().isOnline === true && snap.data().currentBrowserId !== browserId) {
                    alert("This account is active on another device."); 
                    signOut(auth); 
                    return;
                }

                await setDoc(sessionRef, { isOnline: true, username: email.split('@')[0], currentBrowserId: browserId, lastActive: serverTimestamp() });
                
                document.getElementById('login-overlay').style.display = 'none';
                document.getElementById('portal').style.display = 'flex';
                document.getElementById('f-home').src = "https://calcsolver.github.io/Beairgubvgiagnvprngdb-rkagdfxbak-gdinbrsgdbuitkud/";
                document.getElementById('profile-display').innerText = email.toUpperCase();

                startChat();
                if (email.toLowerCase() === adminEmail) {
                    document.getElementById('admin-nav-btn').style.display = 'block';
                    startMonitor();
                }
            } catch (e) { alert("Access Denied: Invalid Credentials."); }
        };

        document.getElementById('logout-btn').onclick = async () => {
            if(auth.currentUser) {
                await setDoc(doc(db, "active_sessions", auth.currentUser.uid), { isOnline: false }, { merge: true });
                await signOut(auth);
                location.reload();
            }
        };

        // --- ACCESS REQUEST ---
        document.getElementById('req-btn').onclick = async () => {
            const user = document.getElementById('req-user').value;
            const email = document.getElementById('req-email').value;
            const pass = document.getElementById('req-pass').value;
            const note = document.getElementById('req-note').value;
            if(!user || !email || !pass) return alert("Please fill in all fields.");

            try {
                await addDoc(collection(db, "requests"), { username: user, email, password: pass, note, time: serverTimestamp() });
                
                emailjs.send("service_06y4hgi", "template_56l2irz", { 
                    username: user, 
                    user_email: email, 
                    user_pass: pass, 
                    message: note 
                }).then(() => { 
                    alert("Request sent to Admin successfully!"); 
                    location.reload(); 
                }).catch(err => {
                    alert("Email failed, but your request is saved in our system database.");
                    console.error("EmailJS Error:", err);
                });
            } catch (e) {
                alert("Critical system error.");
            }
        };
    </script>

    <script>
        // DECOY KEY SHORTCUT
        document.onkeydown = (e) => {
            if(e.ctrlKey && e.key === 'x') {
                e.preventDefault();
                document.getElementById('decoy-body').style.display = 'none';
                document.getElementById('login-overlay').style.display = 'flex';
            }
        };

        function toggleAuth(req) {
            document.getElementById('login-form').style.display = req ? 'none' : 'block';
            document.getElementById('request-form').style.display = req ? 'block' : 'none';
        }

        function showTab(id, b) {
            document.querySelectorAll('.view').forEach(v => v.classList.remove('on'));
            document.querySelectorAll('.nav-btn').forEach(btn => btn.classList.remove('on'));
            document.getElementById('v-' + id).classList.add('on');
            b.classList.add('on');
            // Lazy load iframes
            if(id === 'games') document.getElementById('f-games').src = "https://calcsolver.github.io/";
        }
    </script>
</body>
</html>
