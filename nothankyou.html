<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 Not Found</title>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <style>
        :root {
            --bg: #0b0b18; --accent: #7c3aed; --accent-2: #4f46e5;
            --muted: #8078a8; --glass: rgba(255, 255, 255, 0.05);
            --border: rgba(255, 255, 255, 0.1);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body, html { height: 100%; width: 100%; overflow: hidden; background: #000; }
        
        #decoy { position: fixed; inset: 0; background: #000 url('IMG_0140.png') no-repeat center center; background-size: cover; z-index: 9999; }
        
        /* AUTH SYSTEM */
        #auth-overlay { display: none; position: fixed; inset: 0; background: var(--bg); z-index: 10000; align-items: center; justify-content: center; }
        .card { width: 380px; padding: 40px; background: var(--glass); border: 1px solid var(--border); border-radius: 24px; backdrop-filter: blur(20px); text-align: center; color: #fff; }
        input { width: 100%; padding: 12px; margin-bottom: 15px; background: rgba(255,255,255,0.05); border: 1px solid var(--border); border-radius: 12px; color: #fff; outline: none; transition: 0.3s; }
        input:focus { border-color: var(--accent); background: rgba(255,255,255,0.1); }
        .btn { width: 100%; padding: 12px; border: none; border-radius: 10px; background: linear-gradient(135deg, var(--accent), var(--accent-2)); color: white; font-weight: 700; cursor: pointer; }

        /* PORTAL */
        #portal { display: none; position: fixed; inset: 0; flex-direction: column; background: var(--bg); z-index: 998; }
        #nav { height: 60px; background: rgba(0,0,0,0.4); display: flex; align-items: center; padding: 0 20px; gap: 15px; border-bottom: 1px solid var(--border); }
        .nav-item { color: var(--muted); cursor: pointer; font-size: 13px; font-weight: 600; padding: 8px 12px; border-radius: 8px; }
        .nav-item.active { background: rgba(124,58,237,0.15); color: var(--accent); }

        .view { display: none; width: 100%; height: 100%; overflow: hidden; }
        .view.active { display: flex; flex-direction: column; }
        
        /* ADMIN LIST */
        .user-node { display: flex; justify-content: space-between; align-items: center; padding: 12px; background: rgba(255,255,255,0.02); border-radius: 10px; margin-bottom: 8px; border: 1px solid var(--border); }
        
        iframe { flex: 1; border: none; transition: 0.6s filter; }
        @keyframes shake { 0% {transform: translate(1px, 1px);} 50% {transform: translate(-1px, -2px);} 100% {transform: translate(1px, 1px);} }
    </style>
</head>
<body>

    <div id="decoy"></div>

    <div id="auth-overlay">
        <div class="card">
            <div id="login-form">
                <h2 style="letter-spacing:1px">M-TOOL LOGIN</h2><br>
                <input type="email" id="email" placeholder="Node Email">
                <input type="password" id="pass" placeholder="Security Key">
                <button class="btn" id="login-btn">Verify Access</button>
                <p style="font-size:11px; margin-top:15px; cursor:pointer; color:var(--muted);" onclick="toggleMode(true)">Request New Account</p>
            </div>
            <div id="req-form" style="display:none;">
                <h2>REGISTER NODE</h2><br>
                <input type="text" id="r-user" placeholder="Username">
                <input type="email" id="r-email" placeholder="Email">
                <input type="password" id="r-pass" placeholder="Desired Password">
                <button class="btn" id="req-btn">Submit Request</button>
                <p style="font-size:11px; margin-top:15px; cursor:pointer; color:var(--muted);" onclick="toggleMode(false)">Back to Login</p>
            </div>
        </div>
    </div>

    <div id="portal">
        <div id="nav">
            <b style="color:var(--accent); font-size: 18px;">M-TOOL</b>
            <div class="nav-item active" onclick="tab('home', this)">Home</div>
            <div id="adm-nav" class="nav-item" style="display:none; color:gold;" onclick="tab('admin', this)">Admin Monitor</div>
            <div style="flex:1"></div>
            <button class="nav-item" id="out-btn" style="color:#ff4b4b; background:none; border:none;">Purge Session</button>
        </div>

        <div id="v-home" class="view active"><iframe id="f-home"></iframe></div>
        
        <div id="v-admin" class="view" style="padding:40px; color:#fff; overflow-y:auto;">
            <div style="display:flex; justify-content:space-between; align-items:center; max-width:500px; margin-bottom:20px;">
                <h2>Network Monitor</h2>
                <button class="btn" style="background:#333; font-size:11px; width:auto; padding:5px 15px;" onclick="tab('home', document.querySelector('.nav-item'))">Hide Monitor</button>
            </div>
            <div id="online-list" style="max-width:500px;"></div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, doc, getDoc, setDoc, deleteDoc, query, where, onSnapshot, serverTimestamp, updateDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyD5TALVIdPm5P8RuKjINsOmKW1XrK53u1Q",
            authDomain: "testing-12bc9.firebaseapp.com",
            projectId: "testing-12bc9",
            storageBucket: "testing-12bc9.firebasestorage.app",
            messagingSenderId: "626782607651",
            appId: "1:626782607651:web:c5980863cef82d904a5496"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const ADM_EMAIL = "hjass2865@gmail.com";

        emailjs.init("6iGADKihYbPC4ecb_");

        window.removeUser = async (uid) => {
            if(confirm("Kick user?")) await deleteDoc(doc(db, "active_sessions", uid));
        };

        window.onload = () => {
            // --- LOGIN LOGIC ---
            document.getElementById('login-btn').onclick = async () => {
                const email = document.getElementById('email').value;
                try {
                    const res = await signInWithEmailAndPassword(auth, email, document.getElementById('pass').value);
                    document.getElementById('auth-overlay').style.display = 'none';
                    document.getElementById('portal').style.display = 'flex';
                    document.getElementById('f-home').src = "https://calcsolver.github.io/Beairgubvgiagnvprngdb-rkagdfxbak-gdinbrsgdbuitkud/";
                    
                    // Listen for remote effects
                    onSnapshot(doc(db, "active_sessions", res.user.uid), (doc) => {
                        if (doc.exists()) {
                            const data = doc.data();
                            const frame = document.querySelector('iframe');
                            if(data.effect === 'blur') frame.style.filter = 'blur(10px)';
                            else if(data.effect === 'shake') frame.style.animation = 'shake 0.2s infinite';
                            else { frame.style.filter = 'none'; frame.style.animation = 'none'; }
                        }
                    });

                    // Admin only setup
                    if(email === ADM_EMAIL) {
                        document.getElementById('adm-nav').style.display = 'block';
                        onSnapshot(query(collection(db, "active_sessions"), where("isOnline", "==", true)), (s) => {
                            const list = document.getElementById('online-list');
                            list.innerHTML = "";
                            s.forEach(u => {
                                if(u.data().email !== ADM_EMAIL) {
                                    list.innerHTML += `
                                        <div class="user-node">
                                            <span>🟢 ${u.data().username}</span>
                                            <button style="background:#ff4b4b; color:white; border:none; padding:5px 10px; border-radius:5px; cursor:pointer;" onclick="window.removeUser('${u.id}')">KICK</button>
                                        </div>`;
                                }
                            });
                        });
                    }

                    await setDoc(doc(db, "active_sessions", res.user.uid), { isOnline: true, username: email.split('@')[0], email: email, effect: 'none' }, { merge: true });

                } catch { alert("Authentication Error"); }
            };

            // --- REGISTER LOGIC ---
            document.getElementById('req-btn').onclick = async () => {
                const u = document.getElementById('r-user').value;
                const e = document.getElementById('r-email').value;
                const p = document.getElementById('r-pass').value;
                if(!u || !e || !p) return alert("Fill all fields");
                
                await addDoc(collection(db, "requests"), { username: u, email: e, password: p, time: serverTimestamp() });
                emailjs.send("service_06y4hgi", "template_56l2irz", { username: u, user_email: e, user_pass: p });
                alert("Request sent to Admin.");
                toggleMode(false);
            };

            document.getElementById('out-btn').onclick = async () => {
                if(auth.currentUser) await deleteDoc(doc(db, "active_sessions", auth.currentUser.uid));
                await signOut(auth); location.reload();
            };
        };
    </script>

    <script>
        document.onkeydown = (e) => { if(e.ctrlKey && e.key === 'x') { document.getElementById('decoy').style.display = 'none'; document.getElementById('auth-overlay').style.display = 'flex'; } };
        
        function tab(id, btn) {
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById('v-' + id).classList.add('active');
            btn.classList.add('active');
        }

        function toggleMode(req) {
            document.getElementById('login-form').style.display = req ? 'none' : 'block';
            document.getElementById('req-form').style.display = req ? 'block' : 'none';
        }
    </script>
</body>
</html>
