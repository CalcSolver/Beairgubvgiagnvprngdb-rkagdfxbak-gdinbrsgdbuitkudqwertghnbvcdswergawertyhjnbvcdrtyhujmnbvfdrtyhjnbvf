<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>404 Not Found</title>
    
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <script type="text/javascript">
       (function(){
          try {
              emailjs.init("6iGADKihYbPC4ecb_"); 
              console.log("EmailJS Initialized");
          } catch(e) {
              console.error("EmailJS Failed:", e);
          }
       })();
    </script>

    <style>
        :root { 
            --bg: #0b0b18; --accent: #7c3aed; --accent-2: #4f46e5; --muted: #8078a8; 
            --glass: rgba(255, 255, 255, 0.05); --border: rgba(255, 255, 255, 0.1); 
            --danger: #ef4444; --success: #10b981;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; outline: none; }
        body { background: #fff; color: #222; overflow: hidden; height: 100vh; font-family: 'Segoe UI', sans-serif; }

        /* DECOY */
        #decoy-layer { position: fixed; inset: 0; background: #fff; z-index: 9999; display: flex; align-items: center; justify-content: center; padding: 20px; cursor: default; user-select: none; }
        .g-container { max-width: 650px; width: 100%; }
        .g-robot { background: url('https://www.google.com/images/errors/robot.png') no-repeat; width: 256px; height: 256px; float: right; }
        .g-text h1 { font-size: 18px; font-weight: normal; color: #202124; margin: 0 0 15px; }

        /* AUTH */
        #auth-overlay { display: none; position: fixed; inset: 0; background: var(--bg); z-index: 10000; align-items: center; justify-content: center; }
        .auth-card { width: 400px; padding: 40px; background: var(--glass); border: 1px solid var(--border); border-radius: 28px; backdrop-filter: blur(25px); text-align: center; color: #fff; }
        input { width: 100%; padding: 14px; margin-bottom: 15px; background: rgba(255, 255, 255, 0.03); border: 1px solid var(--border); border-radius: 14px; color: #fff; }
        .btn-main { width: 100%; padding: 15px; border: none; border-radius: 14px; background: linear-gradient(135deg, var(--accent), var(--accent-2)); color: white; font-weight: 700; cursor: pointer; }

        /* PORTAL */
        #portal-interface { display: none; position: fixed; inset: 0; flex-direction: column; background: var(--bg); color: #fff; }
        #top-nav { height: 75px; background: rgba(0,0,0,0.4); display: flex; align-items: center; padding: 0 30px; border-bottom: 1px solid var(--border); }
        .nav-logo { font-size: 20px; font-weight: 900; color: var(--accent); }
        .nav-tabs { display: flex; gap: 10px; margin-left: 40px; }
        .tab-link { padding: 10px 20px; border-radius: 12px; font-size: 13px; color: var(--muted); cursor: pointer; }
        .tab-link.active { background: rgba(124, 58, 237, 0.1); color: var(--accent); }
        .view-container { display: none; flex: 1; overflow: auto; padding: 40px; }
        .view-container.active { display: block; }
        iframe { width: 100%; height: 100%; border: none; border-radius: 20px; }
        
        .request-node { background: rgba(255,255,255,0.02); border: 1px solid var(--border); border-radius: 20px; padding: 20px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
    </style>
</head>
<body>

    <div id="decoy-layer">
        <div class="g-container">
            <div class="g-robot"></div>
            <div class="g-text">
                <h1><b>404.</b> <span>That’s an error.</span></h1>
                <p>The requested URL was not found on this server.</p>
            </div>
        </div>
    </div>

    <div id="auth-overlay">
        <div class="auth-card">
            <div id="login-form">
                <h2 style="margin-bottom:20px;">SYSTEM LOGIN</h2>
                <input type="text" id="l-user" placeholder="Nickname">
                <input type="password" id="l-pass" placeholder="Password">
                <button class="btn-main" id="login-btn">CONNECT</button>
                <p onclick="toggleAuth(true)" style="margin-top:20px; font-size:12px; color:var(--muted); cursor:pointer;">Need Access?</p>
            </div>
            <div id="reg-form" style="display:none">
                <h2 style="margin-bottom:20px;">REQUEST</h2>
                <input type="text" id="r-user" placeholder="Nickname">
                <input type="email" id="r-email" placeholder="Email">
                <input type="password" id="r-pass" placeholder="Password">
                <button class="btn-main" id="submit-req">SUBMIT</button>
                <p onclick="toggleAuth(false)" style="margin-top:20px; font-size:12px; color:var(--muted); cursor:pointer;">Back</p>
            </div>
        </div>
    </div>

    <div id="portal-interface">
        <div id="top-nav">
            <div class="nav-logo">M-TOOL</div>
            <div class="nav-tabs">
                <div class="tab-link active" onclick="switchTab('home', this)">Calculator</div>
                <div id="admin-tab" class="tab-link" style="display:none; color:gold" onclick="switchTab('admin', this)">Admin</div>
            </div>
            <div style="flex:1"></div>
            <button onclick="location.reload()" style="background:none; border:1px solid red; color:red; padding:5px 10px; border-radius:8px; cursor:pointer;">LOGOUT</button>
        </div>
        <div id="view-home" class="view-container active" style="padding:0;">
            <iframe src="https://harrythehacker.neocities.org/Calculator"></iframe>
        </div>
        <div id="view-admin" class="view-container">
            <h1>Admin Panel</h1>
            <div id="request-list"></div>
        </div>
    </div>

    <script type="module">
        console.log("Script Loading...");

        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, serverTimestamp, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyD5TALVIdPm5P8RuKjINsOmKW1XrK53u1Q",
            authDomain: "testing-12bc9.firebaseapp.com",
            projectId: "testing-12bc9",
            storageBucket: "testing-12bc9.firebasestorage.app",
            messagingSenderId: "626782607651",
            appId: "1:626782607651:web:a5365719812c13504a5496"
        };

        try {
            const app = initializeApp(firebaseConfig);
            const auth = getAuth(app);
            const db = getFirestore(app);
            console.log("Firebase Connected");

            // Bypass (5s Hold)
            let hold;
            const decoy = document.getElementById('decoy-layer');
            decoy.onmousedown = () => hold = setTimeout(() => {
                decoy.style.display = 'none';
                document.getElementById('auth-overlay').style.display = 'flex';
            }, 5000);
            decoy.onmouseup = () => clearTimeout(hold);

            // Tabs
            window.toggleAuth = (isReg) => {
                document.getElementById('login-form').style.display = isReg ? 'none' : 'block';
                document.getElementById('reg-form').style.display = isReg ? 'block' : 'none';
            };
            window.switchTab = (t, el) => {
                document.querySelectorAll('.view-container').forEach(v => v.classList.remove('active'));
                document.querySelectorAll('.tab-link').forEach(l => l.classList.remove('active'));
                document.getElementById('view-'+t).classList.add('active');
                el.classList.add('active');
            };

            // CONNECT BUTTON
            document.getElementById('login-btn').onclick = async () => {
                console.log("Connect Clicked");
                const u = document.getElementById('l-user').value.trim();
                const p = document.getElementById('l-pass').value;
                if(!u || !p) return alert("Fill fields");

                const email = u.includes('@') ? u.toLowerCase() : (u + "@mtool.local").toLowerCase();
                
                try {
                    await signInWithEmailAndPassword(auth, email, p);
                    console.log("Success login");
                } catch (e) {
                    alert("Fail: " + e.message);
                }
            };

            // REQUEST BUTTON
            document.getElementById('submit-req').onclick = async () => {
                const n = document.getElementById('r-user').value.trim();
                const e = document.getElementById('r-email').value.trim();
                const p = document.getElementById('r-pass').value;
                try {
                    await addDoc(collection(db, "requests"), { user: n, email: e, pass: p, time: serverTimestamp() });
                    await emailjs.send("service_06y4hgi", "template_56l2irz", { from_name: n, user_email: e, user_pass: p });
                    alert("Sent!");
                    window.toggleAuth(false);
                } catch (err) { alert(err.message); }
            };

            // ADMIN Monitor
            function loadAdmin() {
                onSnapshot(query(collection(db, "requests"), orderBy("time", "desc")), (snap) => {
                    const list = document.getElementById('request-list');
                    list.innerHTML = "";
                    snap.forEach(d => {
                        const data = d.data();
                        list.innerHTML += `<div class="request-node">
                            <div><b>${data.user}</b><br>${data.email} | Pass: ${data.pass}</div>
                            <button onclick="window.delDoc('${d.id}')" style="color:red; background:none; border:none; cursor:pointer;">Delete</button>
                        </div>`;
                    });
                });
            }
            window.delDoc = (id) => deleteDoc(doc(db, "requests", id));

            // Auth Check
            onAuthStateChanged(auth, (user) => {
                if(user) {
                    document.getElementById('auth-overlay').style.display = 'none';
                    document.getElementById('portal-interface').style.display = 'flex';
                    if(user.email === "hjass2865@gmail.com") {
                        document.getElementById('admin-tab').style.display = 'block';
                        loadAdmin();
                    }
                }
            });

        } catch (fatal) {
            console.error("FATAL SCRIPT ERROR:", fatal);
            alert("Script crashed! Check console.");
        }
    </script>
</body>
</html>
