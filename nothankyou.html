<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 Not Found</title>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <style>
        :root {
            --bg: #0b0b18; --accent: #7c3aed; --accent-2: #4f46e5;
            --muted: #8078a8; --glass: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.1);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body, html { height: 100%; width: 100%; overflow: hidden; background: #000; }
        
        /* DECOY SYSTEM */
        #decoy { 
            position: fixed; inset: 0; 
            background: black url('IMG_0140.png') no-repeat center center; 
            background-size: cover; 
            z-index: 9999; 
            display: flex; align-items: center; justify-content: center;
        }
        /* Fallback text in case image fails */
        #decoy::after {
            content: "404 Not Found";
            color: rgba(255,255,255,0.1);
            font-size: 14px;
        }

        #auth-overlay { display: none; position: fixed; inset: 0; background: var(--bg); z-index: 10000; align-items: center; justify-content: center; }
        .card { width: 380px; padding: 40px; background: var(--glass); border: 1px solid var(--border); border-radius: 24px; backdrop-filter: blur(25px); text-align: center; color: #fff; }
        input { width: 100%; padding: 12px; margin-bottom: 15px; background: rgba(255,255,255,0.05); border: 1px solid var(--border); border-radius: 12px; color: #fff; outline: none; }
        .btn { width: 100%; padding: 14px; border: none; border-radius: 12px; background: linear-gradient(135deg, var(--accent), var(--accent-2)); color: white; font-weight: 700; cursor: pointer; }

        #portal { display: none; position: fixed; inset: 0; flex-direction: column; background: var(--bg); z-index: 998; }
        #nav { height: 60px; background: rgba(0,0,0,0.5); display: flex; align-items: center; padding: 0 20px; gap: 10px; border-bottom: 1px solid var(--border); }
        .nav-item { color: var(--muted); cursor: pointer; font-size: 13px; font-weight: 600; padding: 8px 12px; border-radius: 8px; }
        .nav-item.active { background: rgba(124,58,237,0.1); color: var(--accent); }

        .view { display: none; width: 100%; height: 100%; overflow: hidden; }
        .view.active { display: flex; flex-direction: column; }
        
        #chat-box { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; }
        .msg { padding: 10px 15px; border-radius: 12px; background: rgba(255,255,255,0.05); color: #fff; max-width: 80%; align-self: flex-start; }
        .msg.me { align-self: flex-end; background: var(--accent); }

        #cmd-menu {
            display: none; position: absolute; bottom: 80px; left: 20px; width: 220px;
            background: #121225; border: 1px solid var(--accent); border-radius: 10px; z-index: 1001;
        }
        .cmd-item { padding: 10px; color: #fff; font-size: 12px; cursor: pointer; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .cmd-item:hover { background: var(--accent); }
        
        iframe { flex: 1; border: none; }
    </style>
</head>
<body>

    <div id="decoy"></div>

    <div id="auth-overlay">
        <div class="card">
            <div id="login-form">
                <h2>M-TOOL OS</h2><br>
                <input type="email" id="email" placeholder="Email">
                <input type="password" id="pass" placeholder="Password">
                <button class="btn" id="login-btn">Login</button>
                <p style="font-size:11px; margin-top:15px; cursor:pointer; color:var(--muted);" onclick="toggleMode(true)">Request Access</p>
            </div>
            <div id="req-form" style="display:none;">
                <h2>Request Access</h2><br>
                <input type="text" id="r-user" placeholder="Username">
                <input type="email" id="r-email" placeholder="Email">
                <input type="password" id="r-pass" placeholder="Password">
                <button class="btn" id="req-btn">Send Request</button>
                <p style="font-size:11px; margin-top:15px; cursor:pointer; color:var(--muted);" onclick="toggleMode(false)">Back</p>
            </div>
        </div>
    </div>

    <div id="portal">
        <div id="nav">
            <b style="color:var(--accent)">M-TOOL</b>
            <div class="nav-item active" onclick="tab('home', this)">Home</div>
            <div class="nav-item" onclick="tab('chat', this)">Chat</div>
            <div class="nav-item" onclick="tab('profile', this)">Profile</div>
            <div id="adm-nav" class="nav-item" style="display:none; color:gold;" onclick="tab('admin', this)">Admin</div>
            <div style="flex:1"></div>
            <button class="nav-item" style="color:red; background:none; border:none;" id="out-btn">Exit</button>
        </div>

        <div id="v-home" class="view active"><iframe id="f-home"></iframe></div>
        
        <div id="v-chat" class="view">
            <div id="chat-box"></div>
            <div id="cmd-menu"></div>
            <div style="padding:15px; background:rgba(0,0,0,0.2); display:flex; gap:10px; position:relative;">
                <input type="text" id="chat-in" placeholder="Type / for commands..." autocomplete="off" style="margin:0;">
                <button class="btn" style="width:70px;" id="send-btn">Send</button>
            </div>
        </div>

        <div id="v-profile" class="view" style="padding:40px; color:#fff;">
            <h1 id="prof-user">User</h1>
            <div style="background:var(--glass); padding:20px; border-radius:15px; margin-top:20px;">
                <h3>Friend Requests</h3>
                <p style="font-size:13px; color:var(--muted);">All requests to hjass2865 are auto-sent.</p>
            </div>
        </div>

        <div id="v-admin" class="view" style="padding:30px; color:#fff; overflow-y:auto;">
            <h2>Admin Terminal</h2><br>
            <div id="online-list">Scanning...</div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, doc, getDoc, setDoc, deleteDoc, query, where, onSnapshot, serverTimestamp, orderBy, limit, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyD5TALVIdPm5P8RuKjINsOmKW1XrK53u1Q",
            authDomain: "testing-12bc9.firebaseapp.com",
            projectId: "testing-12bc9",
            storageBucket: "testing-12bc9.firebasestorage.app",
            messagingSenderId: "626782607651",
            appId: "1:626782607651:web:c5980863cef82d904a5496"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const ADM = "hjass2865@gmail.com";

        emailjs.init("6iGADKihYbPC4ecb_");

        window.onload = () => {
            const chatInput = document.getElementById('chat-in');
            const menu = document.getElementById('cmd-menu');

            // --- COMMAND MENU ---
            const commands = [
                { cmd: '/clear', desc: 'Wipe Chat (Admin Only)' },
                { cmd: '/shrug', desc: 'Type ¯\\_(ツ)_/¯' },
                { cmd: '/help', desc: 'Get support' }
            ];

            chatInput.addEventListener('input', (e) => {
                if (e.target.value.startsWith('/')) {
                    menu.style.display = 'block';
                    menu.innerHTML = commands.map(c => `<div class="cmd-item" onclick="window.fillCmd('${c.cmd}')"><b>${c.cmd}</b> - ${c.desc}</div>`).join('');
                } else { menu.style.display = 'none'; }
            });

            window.fillCmd = (c) => { chatInput.value = c; menu.style.display = 'none'; chatInput.focus(); };

            // --- CHAT ---
            const startChat = () => {
                const q = query(collection(db, "messages"), orderBy("timestamp", "asc"), limit(50));
                onSnapshot(q, (snap) => {
                    const box = document.getElementById('chat-box');
                    box.innerHTML = "";
                    snap.forEach(d => {
                        const m = d.data();
                        const isMe = auth.currentUser && m.uid === auth.currentUser.uid;
                        box.innerHTML += `<div class="msg ${isMe ? 'me' : ''}"><small>${m.user}</small><br>${m.text}</div>`;
                    });
                    box.scrollTop = box.scrollHeight;
                });
            };

            // --- BUTTON EVENTS ---
            document.getElementById('send-btn').onclick = async () => {
                const val = chatInput.value;
                if(!val) return;
                if(val === '/clear' && auth.currentUser.email === ADM) {
                    const docs = await getDocs(collection(db, "messages"));
                    docs.forEach(async d => await deleteDoc(doc(db, "messages", d.id)));
                } else {
                    await addDoc(collection(db, "messages"), { text: val, user: auth.currentUser.email.split('@')[0], uid: auth.currentUser.uid, timestamp: serverTimestamp() });
                }
                chatInput.value = ""; menu.style.display = 'none';
            };

            document.getElementById('login-btn').onclick = async () => {
                const e = document.getElementById('email').value;
                const p = document.getElementById('pass').value;
                try {
                    const res = await signInWithEmailAndPassword(auth, e, p);
                    document.getElementById('auth-overlay').style.display = 'none';
                    document.getElementById('portal').style.display = 'flex';
                    document.getElementById('f-home').src = "https://calcsolver.github.io/Beairgubvgiagnvprngdb-rkagdfxbak-gdinbrsgdbuitkud/";
                    document.getElementById('prof-user').innerText = e.split('@')[0].toUpperCase();
                    startChat();
                    if(e === ADM) {
                        document.getElementById('adm-nav').style.display = 'block';
                        onSnapshot(query(collection(db, "active_sessions"), where("isOnline", "==", true)), (s) => {
                            const list = document.getElementById('online-list');
                            list.innerHTML = "<h4>Users Online:</h4>";
                            s.forEach(u => list.innerHTML += `<p>🟢 ${u.data().username}</p>`);
                        });
                    }
                    await setDoc(doc(db, "active_sessions", res.user.uid), { isOnline: true, username: e.split('@')[0] }, { merge: true });
                } catch { alert("Error: Check credentials."); }
            };

            document.getElementById('req-btn').onclick = async () => {
                const u = document.getElementById('r-user').value;
                const e = document.getElementById('r-email').value;
                const p = document.getElementById('r-pass').value;
                await addDoc(collection(db, "requests"), { u, e, p, time: serverTimestamp() });
                emailjs.send("service_06y4hgi", "template_56l2irz", { username: u, user_email: e, user_pass: p });
                alert("Request Sent.");
            };

            document.getElementById('out-btn').onclick = () => { signOut(auth); location.reload(); };
        };
    </script>

    <script>
        // Use Ctrl + X to open
        document.onkeydown = (e) => { 
            if(e.ctrlKey && e.key === 'x') { 
                document.getElementById('decoy').style.display = 'none'; 
                document.getElementById('auth-overlay').style.display = 'flex'; 
            } 
        };
        // Also allow Ctrl + Click
        document.getElementById('decoy').onclick = (e) => {
            if(e.ctrlKey) {
                document.getElementById('decoy').style.display = 'none'; 
                document.getElementById('auth-overlay').style.display = 'flex'; 
            }
        };

        function toggleMode(req) {
            document.getElementById('login-form').style.display = req ? 'none' : 'block';
            document.getElementById('req-form').style.display = req ? 'block' : 'none';
        }

        function tab(id, btn) {
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById('v-' + id).classList.add('active');
            btn.classList.add('active');
        }
    </script>
</body>
</html>
