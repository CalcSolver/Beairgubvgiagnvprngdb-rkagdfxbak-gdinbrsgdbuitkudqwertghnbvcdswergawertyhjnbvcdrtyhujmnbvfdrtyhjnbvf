<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>404 Not Found</title>
    
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <script type="text/javascript">
       (function(){ emailjs.init("6iGADKihYbPC4ecb_"); })();
    </script>

    <style>
        :root { 
            --bg: #0b0b18; --accent: #7c3aed; --accent-2: #4f46e5; --muted: #8078a8; 
            --glass: rgba(255, 255, 255, 0.05); --border: rgba(255, 255, 255, 0.1); 
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; outline: none; }
        body { background: #fff; overflow: hidden; height: 100vh; }
        
        /* DECOY */
        #decoy { position: fixed; inset: 0; background: #fff; z-index: 9999; display: flex; align-items: center; justify-content: center; user-select: none; touch-action: none; }
        .g-container { max-width: 650px; width: 100%; color: #202124; pointer-events: none; }
        .g-robot { background: url('https://www.google.com/images/errors/robot.png') no-repeat; width: 256px; height: 256px; float: right; }

        /* AUTH OVERLAY */
        #auth-overlay { display: none; position: fixed; inset: 0; background: var(--bg); z-index: 10000; align-items: center; justify-content: center; }
        .card { width: 380px; padding: 40px; background: var(--glass); border: 1px solid var(--border); border-radius: 28px; backdrop-filter: blur(25px); text-align: center; color: #fff; }
        h2 { margin-bottom: 25px; font-weight: 900; color: var(--accent); }
        input { width: 100%; padding: 14px; margin-bottom: 15px; background: rgba(255,255,255,0.05); border: 1px solid var(--border); border-radius: 12px; color: #fff; }
        .btn { width: 100%; padding: 15px; border: none; border-radius: 12px; background: linear-gradient(135deg, var(--accent), var(--accent-2)); color: white; font-weight: 700; cursor: pointer; }

        /* PORTAL */
        #portal { display: none; position: fixed; inset: 0; flex-direction: column; background: var(--bg); color: #fff; }
        #nav { height: 65px; background: rgba(0,0,0,0.4); display: flex; align-items: center; padding: 0 25px; border-bottom: 1px solid var(--border); }
        .nav-item { margin: 0 15px; color: var(--muted); cursor: pointer; font-size: 14px; }
        .nav-item.active { color: var(--accent); font-weight: bold; }
        
        .view { display: none; flex: 1; padding: 25px; overflow-y: auto; }
        .view.active { display: block; }
        iframe { width: 100%; height: 100%; border: none; border-radius: 15px; }

        /* ADMIN */
        .node { background: var(--glass); padding: 15px; border-radius: 15px; margin-bottom: 10px; border: 1px solid var(--border); font-size: 13px; }
        
        @media (max-width: 600px) { .g-robot { display: none; } }
    </style>
</head>
<body>

    <div id="decoy">
        <div class="g-container">
            <div class="g-robot"></div>
            <h1><b>404.</b> <span style="color:#70757a">That’s an error.</span></h1>
            <p>The requested URL was not found on this server. <br><span style="color:#70757a">That’s all we know.</span></p>
        </div>
    </div>

    <div id="auth-overlay">
        <div class="card">
            <div id="login-view">
                <h2>M-TOOL</h2>
                <input type="text" id="l-user" placeholder="Nickname">
                <input type="password" id="l-pass" placeholder="Password">
                <button class="btn" id="login-btn">CONNECT</button>
                <p onclick="toggleAuth(true)" style="margin-top:20px; font-size:11px; color:var(--muted); cursor:pointer;">Request Access</p>
            </div>
            <div id="reg-view" style="display:none">
                <h2>REQUEST</h2>
                <input type="text" id="r-user" placeholder="Nickname">
                <input type="email" id="r-email" placeholder="Email">
                <input type="password" id="r-pass" placeholder="Password">
                <button class="btn" id="submit-req">SUBMIT</button>
                <p onclick="toggleAuth(false)" style="margin-top:20px; font-size:11px; color:var(--muted); cursor:pointer;">Back</p>
            </div>
        </div>
    </div>

    <div id="portal">
        <div id="nav">
            <b style="color:var(--accent); font-size:20px;">M</b>
            <div class="nav-item active" onclick="tab('home', this)">HUB</div>
            <div class="nav-item" id="adm-link" style="display:none; color:gold;" onclick="tab('admin', this)">ADMIN</div>
            <div style="flex:1"></div>
            <button onclick="location.reload()" style="background:none; border:none; color:red; cursor:pointer;">LOGOUT</button>
        </div>

        <div id="v-home" class="view active" style="padding:0;">
            <iframe src="https://harrythehacker.neocities.org/Calculator"></iframe>
        </div>

        <div id="v-admin" class="view">
            <h3>Active Sessions</h3>
            <div id="session-list" style="margin: 15px 0 30px 0;"></div>
            <h3>Requests</h3>
            <div id="request-list"></div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, doc, setDoc, onSnapshot, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyD5TALVIdPm5P8RuKjINsOmKW1XrK53u1Q",
            authDomain: "testing-12bc9.firebaseapp.com",
            projectId: "testing-12bc9",
            storageBucket: "testing-12bc9.firebasestorage.app",
            messagingSenderId: "626782607651",
            appId: "1:626782607651:web:c5980863cef82d904a5496"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const ADMIN_EMAIL = "hjass2865@gmail.com";

        // BYPASS
        const decoy = document.getElementById('decoy');
        let timer;
        const unlock = () => { decoy.style.display = 'none'; document.getElementById('auth-overlay').style.display = 'flex'; };
        
        decoy.onmousedown = () => timer = setTimeout(unlock, 5000);
        decoy.onmouseup = () => clearTimeout(timer);
        decoy.ontouchstart = () => timer = setTimeout(unlock, 5000);
        decoy.ontouchend = () => clearTimeout(timer);
        window.onkeydown = (e) => { if(e.key.toLowerCase()==='g') unlock(); };

        // UI
        window.toggleAuth = (reg) => {
            document.getElementById('login-view').style.display = reg ? 'none' : 'block';
            document.getElementById('reg-view').style.display = reg ? 'block' : 'none';
        };
        window.tab = (t, el) => {
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            document.getElementById('v-'+t).classList.add('active');
            el.classList.add('active');
        };

        // ADMIN ENGINE
        function runAdmin() {
            onSnapshot(collection(db, "active_sessions"), (s) => {
                const list = document.getElementById('session-list');
                list.innerHTML = "";
                s.forEach(d => {
                    const data = d.data();
                    list.innerHTML += `<div class="node">👤 <b>${data.username}</b> logged in.</div>`;
                });
            });
            onSnapshot(collection(db, "requests"), (s) => {
                const list = document.getElementById('request-list');
                list.innerHTML = "";
                s.forEach(d => {
                    const r = d.data();
                    list.innerHTML += `<div class="node">📩 <b>${r.username}</b>: ${r.email} | Pass: ${r.password}</div>`;
                });
            });
        }

        // BUTTONS
        document.getElementById('submit-req').onclick = async () => {
            const u = document.getElementById('r-user').value;
            const e = document.getElementById('r-email').value;
            const p = document.getElementById('r-pass').value;
            if(!u || !e || !p) return alert("Fill all fields");
            await addDoc(collection(db, "requests"), { username: u, email: e, password: p, timestamp: serverTimestamp() });
            await emailjs.send("service_06y4hgi", "template_56l2irz", { from_name: u, user_email: e, user_pass: p });
            alert("Sent!");
            toggleAuth(false);
        };

        document.getElementById('login-btn').onclick = async () => {
            const u = document.getElementById('l-user').value.trim();
            const p = document.getElementById('l-pass').value;
            const email = u.includes('@') ? u : `${u}@mtool.local`;
            try {
                await signInWithEmailAndPassword(auth, email, p);
            } catch { alert("Denied."); }
        };

        onAuthStateChanged(auth, async (user) => {
            if(user) {
                const nick = user.email.split('@')[0];
                document.getElementById('auth-overlay').style.display = 'none';
                document.getElementById('portal').style.display = 'flex';
                // Log session once
                await setDoc(doc(db, "active_sessions", user.uid), { username: nick, loginTime: serverTimestamp() });
                
                if(user.email === ADMIN_EMAIL) {
                    document.getElementById('adm-link').style.display = 'inline-block';
                    runAdmin();
                }
            }
        });
    </script>
</body>
</html>
