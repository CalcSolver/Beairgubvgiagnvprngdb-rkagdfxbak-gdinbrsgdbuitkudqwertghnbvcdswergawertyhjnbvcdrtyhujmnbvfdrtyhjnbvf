<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>404 Not Found</title>
    <style>
        :root { 
            --bg: #0b0b18; 
            --accent: #7c3aed; 
            --accent-2: #4f46e5; 
            --muted: #8078a8; 
            --glass: rgba(255, 255, 255, 0.05); 
            --border: rgba(255, 255, 255, 0.1); 
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #fff; color: #222; overflow: hidden; height: 100vh; font-family: arial, sans-serif; }
        
        /* DECOY 404 THEME */
        #decoy { 
            position: fixed; inset: 0; background: #fff; z-index: 9999; 
            display: flex; align-items: center; justify-content: center; 
            padding: 20px; cursor: default; 
            /* CRITICAL FOR FINGER HOLD */
            user-select: none; 
            -webkit-user-select: none;
            -webkit-touch-callout: none; 
            touch-action: none; 
        }
        .g-container { max-width: 650px; width: 100%; pointer-events: none; }
        .g-robot { 
            background: url('https://www.google.com/images/errors/robot.png') no-repeat; 
            width: 256px; height: 256px; float: right; margin: 0 0 0 20px; 
        }
        .g-text { text-align: left; }
        .g-text h1 { font-size: 18px; font-weight: normal; color: #202124; margin: 0 0 15px; }
        .g-text h1 span { color: #70757a; }
        .g-text p { font-size: 14px; line-height: 1.6; color: #202124; margin: 15px 0; }
        .g-text ins { color: #70757a; text-decoration: none; }

        /* AUTH & PORTAL */
        #auth-overlay { display: none; position: fixed; inset: 0; background: var(--bg); z-index: 10000; align-items: center; justify-content: center; font-family: 'Segoe UI', sans-serif; }
        .card { width: 360px; padding: 30px; background: var(--glass); border: 1px solid var(--border); border-radius: 24px; backdrop-filter: blur(20px); text-align: center; color: #fff; }
        input { width: 100%; padding: 12px; margin-bottom: 15px; background: rgba(255,255,255,0.05); border: 1px solid var(--border); border-radius: 12px; color: #fff; outline: none; }
        .btn { width: 100%; padding: 12px; border: none; border-radius: 10px; background: linear-gradient(135deg, var(--accent), var(--accent-2)); color: white; font-weight: 700; cursor: pointer; }
        #portal { display: none; position: fixed; inset: 0; flex-direction: column; background: var(--bg); color: #fff; }
        #nav { height: 60px; background: rgba(0,0,0,0.4); display: flex; align-items: center; padding: 0 20px; border-bottom: 1px solid var(--border); gap: 10px; }
        .nav-item { color: var(--muted); cursor: pointer; font-size: 13px; padding: 8px 12px; border-radius: 8px; }
        .nav-item.active { background: rgba(124,58,237,0.2); color: var(--accent); }
        .view { display: none; flex: 1; width: 100%; height: 100%; }
        .view.active { display: flex; }
        #calc-frame { flex: 1; border: none; width: 100%; height: 100%; }

        @media (max-width: 600px) {
            .g-robot { float: none; margin: 0 auto 20px; display: block; }
            .g-text { text-align: center; }
        }
    </style>
</head>
<body>

    <div id="decoy">
        <div class="g-container">
            <div class="g-robot"></div>
            <div class="g-text">
                <h1><b>404.</b> <span>That’s an error.</span></h1>
                <p>The requested URL was not found on this server. <ins>That’s all we know.</ins></p>
            </div>
        </div>
    </div>

    <div id="auth-overlay">
        <div class="card">
            <div id="login-view">
                <h2 style="margin-bottom:20px">M-TOOL</h2>
                <input type="text" id="l-user" placeholder="Username">
                <input type="password" id="l-pass" placeholder="Password">
                <button class="btn" id="login-btn">Connect</button>
            </div>
        </div>
    </div>

    <div id="portal">
        <div id="nav">
            <b style="color:var(--accent)">M-TOOL</b>
            <div class="nav-item active">Calculator</div>
            <div style="flex:1"></div>
            <button onclick="location.reload()" style="background:none; border:none; color:#ff4b4b; cursor:pointer;">Logout</button>
        </div>
        <div class="view active">
            <iframe id="calc-frame" src="https://harrythehacker.neocities.org/Calculator"></iframe>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyD5TALVIdPm5P8RuKjINsOmKW1XrK53u1Q",
            authDomain: "testing-12bc9.firebaseapp.com",
            projectId: "testing-12bc9",
            storageBucket: "testing-12bc9.firebasestorage.app",
            messagingSenderId: "626782607651",
            appId: "1:626782607651:web:c5980863cef82d904a5496"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // BYPASS LOGIC
        const decoy = document.getElementById('decoy');
        let timer;

        const unlock = () => {
            decoy.style.display = 'none';
            document.getElementById('auth-overlay').style.display = 'flex';
        };

        // KEYBOARD: Globe (Earth) or Ctrl/Cmd + G
        document.addEventListener('keydown', (e) => {
            // Specifically targeting the Globe key behavior + G
            const isEarthKey = e.key === 'Fn' || e.key === 'Global';
            const isControlG = (e.ctrlKey || e.metaKey) && e.key.toLowerCase() === 'g';

            if (isControlG || (isEarthKey && e.key.toLowerCase() === 'g')) {
                e.preventDefault();
                unlock();
            }
        });

        // FINGER HOLD (5 SECONDS)
        const startHold = (e) => {
            // Clear any existing timer to prevent double-triggering
            clearTimeout(timer);
            timer = setTimeout(unlock, 5000);
        };

        const stopHold = () => clearTimeout(timer);

        // Mobile Finger Events
        decoy.addEventListener('touchstart', startHold, { passive: true });
        decoy.addEventListener('touchend', stopHold);
        decoy.addEventListener('touchcancel', stopHold);

        // Mouse Backup
        decoy.addEventListener('mousedown', startHold);
        decoy.addEventListener('mouseup', stopHold);
        decoy.addEventListener('mouseleave', stopHold);

        // AUTH
        document.getElementById('login-btn').onclick = async () => {
            const u = document.getElementById('l-user').value;
            const p = document.getElementById('l-pass').value;
            const email = u.includes('@') ? u : `${u}@mtool.local`;
            try {
                const res = await signInWithEmailAndPassword(auth, email, p);
                document.getElementById('auth-overlay').style.display = 'none';
                document.getElementById('portal').style.display = 'flex';
                await setDoc(doc(db, "active_sessions", res.user.uid), { username: u, lastSeen: serverTimestamp() });
            } catch { alert("Denied"); }
        };
    </script>
</body>
</html>
