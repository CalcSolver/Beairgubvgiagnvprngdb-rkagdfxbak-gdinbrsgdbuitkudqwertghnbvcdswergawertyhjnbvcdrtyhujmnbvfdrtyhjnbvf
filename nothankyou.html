<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>404 Not Found</title>
    
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <script type="text/javascript">
       (function(){
          try {
              emailjs.init("6iGADKihYbPC4ecb_"); 
          } catch(e) {
              console.error("EmailJS Offline");
          }
       })();
    </script>

    <style>
        /* --- SYSTEM STYLING --- */
        :root { 
            --bg: #0b0b18; 
            --accent: #7c3aed; 
            --accent-2: #4f46e5; 
            --glass: rgba(255, 255, 255, 0.05); 
            --border: rgba(255, 255, 255, 0.1); 
            --danger: #ef4444;
        }
        
        /* BLOCK MOUSE INTERACTION */
        * { 
            margin: 0; padding: 0; box-sizing: border-box; outline: none; 
            cursor: none !important; 
            user-select: none; 
            -webkit-user-select: none; 
            -webkit-touch-callout: none; 
        }

        body { 
            background: #fff; 
            color: #222; 
            overflow: hidden; 
            height: 100vh; 
            font-family: 'Segoe UI', 'Helvetica Neue', sans-serif;
            touch-action: none; 
        }

        /* --- LAYER 1: THE DECOY (Visible to everyone) --- */
        #decoy-layer { 
            position: fixed; 
            inset: 0; 
            background: #fff; 
            z-index: 9999; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            padding: 20px; 
            pointer-events: none; /* Only enabled for iPad Safari */
        }
        
        .g-container { max-width: 650px; width: 100%; pointer-events: none; }
        .g-robot { background: url('https://www.google.com/images/errors/robot.png') no-repeat; width: 256px; height: 256px; float: right; }
        .g-text h1 { font-size: 18px; font-weight: normal; color: #202124; margin: 0 0 15px; }

        /* --- LAYER 2: THE LOGIN PAGE (Hidden until iPad gesture) --- */
        #auth-overlay { 
            display: none; /* <--- THIS IS WHY YOU DON'T SEE IT ON LOAD */
            position: fixed; 
            inset: 0; 
            background: var(--bg); 
            z-index: 10000; 
            align-items: center; 
            justify-content: center; 
        }

        .auth-card { 
            width: 90%; 
            max-width: 420px; 
            padding: 50px 40px; 
            background: var(--glass); 
            border: 1px solid var(--border); 
            border-radius: 35px; 
            backdrop-filter: blur(30px); 
            text-align: center; 
            color: #fff; 
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .auth-card h2 {
            font-size: 24px;
            letter-spacing: 2px;
            margin-bottom: 30px;
            font-weight: 800;
            color: #fff;
        }

        input { 
            width: 100%; 
            padding: 16px; 
            margin-bottom: 20px; 
            background: rgba(255, 255, 255, 0.05); 
            border: 1px solid var(--border); 
            border-radius: 18px; 
            color: #fff; 
            font-size: 16px;
            pointer-events: auto; /* Re-enables touch for typing */
        }

        .btn-main { 
            width: 100%; 
            padding: 18px; 
            border: none; 
            border-radius: 18px; 
            background: linear-gradient(135deg, var(--accent), var(--accent-2)); 
            color: white; 
            font-weight: 800; 
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 1px;
            pointer-events: auto;
            transition: transform 0.2s ease;
        }

        /* --- LAYER 3: THE MAIN PORTAL (Post-Login) --- */
        #portal-interface { 
            display: none; 
            position: fixed; 
            inset: 0; 
            flex-direction: column; 
            background: var(--bg); 
            color: #fff; 
        }

        #top-nav { 
            height: 80px; 
            background: rgba(0,0,0,0.6); 
            display: flex; 
            align-items: center; 
            padding: 0 40px; 
            border-bottom: 1px solid var(--border); 
            backdrop-filter: blur(10px);
        }

        .nav-logo { font-size: 22px; font-weight: 900; color: var(--accent); letter-spacing: 1px; }

        #view-content { flex: 1; padding: 20px; }
        iframe { width: 100%; height: 100%; border: none; border-radius: 25px; pointer-events: auto; }
    </style>
</head>
<body oncontextmenu="return false;">

    <div id="decoy-layer">
        <div class="g-container">
            <div class="g-robot"></div>
            <div class="g-text">
                <h1><b>404.</b> <span>That’s an error.</span></h1>
                <p>The requested URL was not found on this server.</p>
            </div>
        </div>
    </div>

    <div id="auth-overlay">
        <div class="auth-card">
            <div id="login-form">
                <h2>CORE SYSTEM ACCESS</h2>
                <input type="text" id="l-user" placeholder="SECURE NICKNAME">
                <input type="password" id="l-pass" placeholder="ACCESS KEY">
                <button class="btn-main" id="login-btn">ESTABLISH CONNECTION</button>
            </div>
        </div>
    </div>

    <div id="portal-interface">
        <div id="top-nav">
            <div class="nav-logo">M-TOOL // V2.0</div>
            <div style="flex:1"></div>
            <button onclick="location.reload()" style="background:none; border:1px solid #ef4444; color:#ef4444; padding:8px 15px; border-radius:12px; font-weight:bold; pointer-events:auto;">TERMINATE SESSION</button>
        </div>
        <div id="view-content">
            <iframe src="https://harrythehacker.neocities.org/Calculator"></iframe>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        // FIREBASE CONFIG
        const firebaseConfig = {
            apiKey: "AIzaSyD5TALVIdPm5P8RuKjINsOmKW1XrK53u1Q",
            authDomain: "testing-12bc9.firebaseapp.com",
            projectId: "testing-12bc9",
            storageBucket: "testing-12bc9.firebasestorage.app",
            messagingSenderId: "626782607651",
            appId: "1:626782607651:web:a5365719812c13504a5496"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        // --- IPAD SAFARI GATEKEEPER SCRIPT ---
        const isiPad = /iPad|Macintosh/.test(navigator.userAgent) && 'ontouchend' in document;
        const isSafari = /^((?!chrome|android).)*safari/i.test(navigator.userAgent);

        if (isiPad && isSafari) {
            const decoy = document.getElementById('decoy-layer');
            const authOverlay = document.getElementById('auth-overlay');
            
            // Allow touch interaction only for iPad
            decoy.style.pointerEvents = "auto";

            let timer;
            
            // The 5-Second Secret Trigger
            decoy.addEventListener('touchstart', (e) => {
                timer = setTimeout(() => {
                    decoy.style.display = 'none'; // Removes 404
                    authOverlay.style.display = 'flex'; // Shows Login Page
                }, 5000);
            });

            decoy.addEventListener('touchend', () => clearTimeout(timer));
            decoy.addEventListener('touchmove', () => clearTimeout(timer));
            decoy.addEventListener('touchcancel', () => clearTimeout(timer));
        } else {
            console.warn("Hardware mismatched. System lockout active.");
        }

        // --- FAULTY CONNECT BUTTON LOGIC ---
        document.getElementById('login-btn').onclick = function() {
            const btn = this;
            btn.style.background = 'var(--danger)';
            btn.innerText = "HANDSHAKE REFUSED...";
            
            setTimeout(() => {
                btn.style.background = '';
                btn.innerText = "ESTABLISH CONNECTION";
                alert("CRITICAL ERROR: Handshake timeout. Protocol 0x8842 failed to respond.");
            }, 2000);
        };

        // AUTH MONITOR
        onAuthStateChanged(auth, (user) => {
            if(user) {
                document.getElementById('decoy-layer').style.display = 'none';
                document.getElementById('auth-overlay').style.display = 'none';
                document.getElementById('portal-interface').style.display = 'flex';
            }
        });
    </script>
</body>
</html>
