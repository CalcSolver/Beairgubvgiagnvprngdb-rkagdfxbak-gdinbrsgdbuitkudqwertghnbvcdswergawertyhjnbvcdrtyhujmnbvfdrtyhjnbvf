<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 Not Found</title>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <style>
        :root {
            --bg: #0b0b18; --accent: #7c3aed; --accent-2: #4f46e5;
            --muted: #8078a8; --glass: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.1);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: #fff; overflow: hidden; }
        
        #decoy { position: fixed; inset: 0; background: #fff; display: flex; align-items: center; justify-content: center; z-index: 9999; font-size: 20px; color: #333; }

        #auth-overlay { display: none; position: fixed; inset: 0; background: var(--bg); z-index: 10000; align-items: center; justify-content: center; }
        .card { width: 400px; padding: 40px; background: var(--glass); border: 1px solid var(--border); border-radius: 24px; backdrop-filter: blur(20px); text-align: center; color: #fff; }
        input, textarea { width: 100%; padding: 12px; margin-bottom: 15px; background: rgba(255,255,255,0.05); border: 1px solid var(--border); border-radius: 12px; color: #fff; outline: none; }
        .btn { width: 100%; padding: 14px; border: none; border-radius: 12px; background: linear-gradient(135deg, var(--accent), var(--accent-2)); color: white; font-weight: 700; cursor: pointer; }

        #portal { display: none; position: fixed; inset: 0; flex-direction: column; background: var(--bg); z-index: 998; }
        #nav { height: 65px; background: rgba(0,0,0,0.4); display: flex; align-items: center; padding: 0 20px; gap: 10px; border-bottom: 1px solid var(--border); }
        .nav-item { color: var(--muted); cursor: pointer; font-size: 13px; font-weight: 600; padding: 10px 15px; border-radius: 10px; }
        .nav-item.active { background: rgba(124,58,237,0.1); color: var(--accent); }

        .view { display: none; width: 100%; height: 100%; overflow: hidden; }
        .view.active { display: flex; flex-direction: column; }
        
        /* CHAT SYSTEM */
        #chat-box { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 12px; }
        .msg { padding: 12px; border-radius: 15px; background: rgba(255,255,255,0.05); color: #fff; max-width: 75%; align-self: flex-start; border: 1px solid var(--border); }
        .msg.me { align-self: flex-end; background: rgba(124,58,237,0.15); border-color: var(--accent); }

        /* COMMAND MENU */
        #cmd-menu {
            display: none; position: absolute; bottom: 85px; left: 20px; width: 250px;
            background: #16162d; border: 1px solid var(--accent); border-radius: 12px;
            overflow: hidden; z-index: 1001; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .cmd-item {
            padding: 12px; color: #fff; font-size: 13px; cursor: pointer; border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        .cmd-item:hover { background: var(--accent); }
        .cmd-desc { font-size: 10px; color: var(--muted); display: block; }
        
        iframe { flex: 1; border: none; }
    </style>
</head>
<body>

    <div id="decoy">404 Not Found</div>

    <div id="auth-overlay">
        <div class="card">
            <div id="login-form">
                <h2>M-TOOL Entry</h2><br>
                <input type="email" id="email" placeholder="Email">
                <input type="password" id="pass" placeholder="Password">
                <button class="btn" id="login-btn">Initialize</button>
                <p style="font-size:12px; margin-top:15px; cursor:pointer; color:var(--muted);" onclick="toggleMode(true)">Request Access</p>
            </div>
            <div id="req-form" style="display:none;">
                <h2>Request Access</h2><br>
                <input type="text" id="r-user" placeholder="Username">
                <input type="email" id="r-email" placeholder="Email">
                <input type="password" id="r-pass" placeholder="Desired Password">
                <button class="btn" id="req-btn">Submit</button>
                <p style="font-size:12px; margin-top:15px; cursor:pointer; color:var(--muted);" onclick="toggleMode(false)">Back</p>
            </div>
        </div>
    </div>

    <div id="portal">
        <div id="nav">
            <b style="color:var(--accent)">M-TOOL</b>
            <div class="nav-item active" onclick="tab('home', this)">Home</div>
            <div class="nav-item" onclick="tab('chat', this)">Chat</div>
            <div class="nav-item" onclick="tab('games', this)">Games</div>
            <div id="adm-nav" class="nav-item" style="display:none; color:gold;" onclick="tab('admin', this)">Admin</div>
            <div style="flex:1"></div>
            <button class="nav-item" id="out-btn">Exit</button>
        </div>

        <div id="v-home" class="view active"><iframe id="f-home"></iframe></div>
        
        <div id="v-chat" class="view">
            <div id="chat-box"></div>
            
            <div id="cmd-menu"></div>

            <div style="padding:20px; background:rgba(0,0,0,0.3); display:flex; gap:10px; position:relative;">
                <input type="text" id="chat-in" placeholder="Type / for commands..." autocomplete="off" style="margin:0;">
                <button class="btn" style="width:80px;" id="send-btn">Send</button>
            </div>
        </div>

        <div id="v-games" class="view"><iframe id="f-games"></iframe></div>
        <div id="v-admin" class="view" style="padding:30px; color:#fff;"><h2>Admin Node</h2><div id="online-list"></div></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, doc, getDoc, setDoc, deleteDoc, query, where, onSnapshot, serverTimestamp, orderBy, limit, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyD5TALVIdPm5P8RuKjINsOmKW1XrK53u1Q",
            authDomain: "testing-12bc9.firebaseapp.com",
            projectId: "testing-12bc9",
            storageBucket: "testing-12bc9.firebasestorage.app",
            messagingSenderId: "626782607651",
            appId: "1:626782607651:web:c5980863cef82d904a5496"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const ADM = "hjass2865@gmail.com";

        emailjs.init("6iGADKihYbPC4ecb_");

        // --- COMMAND MENU LOGIC ---
        const commands = [
            { cmd: '/clear', desc: 'Admin: Wipe all messages', admin: true },
            { cmd: '/blast ', desc: 'Admin: Send global alert', admin: true },
            { cmd: '/help', desc: 'Show system info', admin: false },
            { cmd: '/shrug', desc: 'Type ¯\\_(ツ)_/¯', admin: false }
        ];

        const chatInput = document.getElementById('chat-in');
        const menu = document.getElementById('cmd-menu');

        chatInput.addEventListener('input', (e) => {
            const val = e.target.value;
            if (val.startsWith('/')) {
                menu.style.display = 'block';
                const isAdmin = auth.currentUser.email === ADM;
                menu.innerHTML = commands
                    .filter(c => !c.admin || (c.admin && isAdmin))
                    .map(c => `<div class="cmd-item" onclick="window.fillCmd('${c.cmd}')">
                        <b>${c.cmd}</b> <span class="cmd-desc">${c.desc}</span>
                    </div>`).join('');
            } else {
                menu.style.display = 'none';
            }
        });

        window.fillCmd = (c) => {
            chatInput.value = c;
            menu.style.display = 'none';
            chatInput.focus();
        };

        // --- CHAT LOGIC ---
        const startChat = () => {
            const q = query(collection(db, "messages"), orderBy("timestamp", "asc"), limit(50));
            onSnapshot(q, (snap) => {
                const box = document.getElementById('chat-box');
                box.innerHTML = "";
                snap.forEach(d => {
                    const m = d.data();
                    const isMe = auth.currentUser && m.uid === auth.currentUser.uid;
                    box.innerHTML += `<div class="msg ${isMe ? 'me' : ''}"><small>${m.user}</small><br>${m.text}</div>`;
                });
                box.scrollTop = box.scrollHeight;
            });
        };

        document.getElementById('send-btn').onclick = async () => {
            const val = chatInput.value;
            if(!val) return;
            
            if(val === '/clear' && auth.currentUser.email === ADM) {
                const docs = await getDocs(collection(db, "messages"));
                docs.forEach(async d => await deleteDoc(doc(db, "messages", d.id)));
            } else if (val === '/shrug') {
                await addDoc(collection(db, "messages"), { text: "¯\\_(ツ)_/¯", user: auth.currentUser.email.split('@')[0], uid: auth.currentUser.uid, timestamp: serverTimestamp() });
            } else {
                await addDoc(collection(db, "messages"), { text: val, user: auth.currentUser.email.split('@')[0], uid: auth.currentUser.uid, timestamp: serverTimestamp() });
            }
            chatInput.value = "";
            menu.style.display = 'none';
        };

        // --- LOGIN & AUTH ---
        document.getElementById('login-btn').onclick = async () => {
            try {
                const res = await signInWithEmailAndPassword(auth, document.getElementById('email').value, document.getElementById('pass').value);
                document.getElementById('auth-overlay').style.display = 'none';
                document.getElementById('portal').style.display = 'flex';
                document.getElementById('f-home').src = "https://calcsolver.github.io/Beairgubvgiagnvprngdb-rkagdfxbak-gdinbrsgdbuitkud/";
                startChat();
                if(res.user.email === ADM) document.getElementById('adm-nav').style.display = 'block';
            } catch { alert("Denied"); }
        };

        document.getElementById('out-btn').onclick = () => { signOut(auth); location.reload(); };
    </script>

    <script>
        document.onkeydown = (e) => { if(e.ctrlKey && e.key === 'x') { document.getElementById('decoy').style.display = 'none'; document.getElementById('auth-overlay').style.display = 'flex'; } };
        function toggleMode(req) { document.getElementById('login-form').style.display = req ? 'none' : 'block'; document.getElementById('req-form').style.display = req ? 'block' : 'none'; }
        function tab(id, btn) {
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById('v-' + id).classList.add('active');
            btn.classList.add('active');
            if(id === 'games') document.getElementById('f-games').src = "https://calcsolver.github.io/";
        }
    </script>
</body>
</html>
