<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>404 Not Found</title>
    <style>
        :root { --bg: #0b0b18; --accent: #7c3aed; --glass: rgba(255, 255, 255, 0.05); --border: rgba(255, 255, 255, 0.1); }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #fff; font-family: arial, sans-serif; overflow: hidden; height: 100vh; }
        
        /* DECOY */
        #decoy { position: fixed; inset: 0; background: #fff; z-index: 999; display: flex; align-items: center; justify-content: center; cursor: default; }
        .g-container { max-width: 650px; width: 100%; }
        .g-robot { background: url('https://www.google.com/images/errors/robot.png') no-repeat; width: 256px; height: 256px; float: right; }

        /* MODAL */
        #auth-overlay { display: none; position: fixed; inset: 0; background: var(--bg); z-index: 1000; align-items: center; justify-content: center; }
        .card { width: 350px; padding: 30px; background: var(--glass); border: 1px solid var(--border); border-radius: 20px; backdrop-filter: blur(15px); text-align: center; color: #fff; }
        input { width: 100%; padding: 12px; margin-bottom: 10px; background: rgba(255,255,255,0.05); border: 1px solid var(--border); border-radius: 10px; color: #fff; outline: none; }
        .btn { width: 100%; padding: 12px; border: none; border-radius: 10px; background: var(--accent); color: white; font-weight: bold; cursor: pointer; }

        /* PORTAL */
        #portal { display: none; position: fixed; inset: 0; flex-direction: column; background: var(--bg); color: #fff; }
        #nav { height: 60px; background: rgba(0,0,0,0.3); display: flex; align-items: center; padding: 0 20px; border-bottom: 1px solid var(--border); gap: 15px; }
        .view { display: none; flex: 1; padding: 20px; overflow-y: auto; }
        .view.active { display: block; }
        .node { background: rgba(255,255,255,0.03); border: 1px solid var(--border); padding: 15px; border-radius: 15px; margin-bottom: 10px; }
    </style>
</head>
<body>

    <div id="decoy">
        <div class="g-container">
            <div class="g-robot"></div>
            <div style="font-size: 14px; line-height: 1.6; color: #202124;">
                <h1 style="font-size: 18px; font-weight: normal;"><b>404.</b> <span>That’s an error.</span></h1>
                <p>The requested URL was not found on this server. <br><ins>That’s all we know.</ins></p>
            </div>
        </div>
    </div>

    <div id="auth-overlay">
        <div class="card">
            <div id="login-view">
                <h2 style="margin-bottom:15px;">M-TOOL</h2>
                <input type="text" id="l-user" placeholder="Nickname">
                <input type="password" id="l-pass" placeholder="Password">
                <button class="btn" id="login-btn">LOGIN</button>
                <p onclick="toggleReg(true)" style="margin-top:15px; font-size:11px; color:#888; cursor:pointer;">Request Access</p>
            </div>
            <div id="reg-view" style="display:none">
                <h2 style="margin-bottom:15px;">REQUEST</h2>
                <input type="text" id="r-user" placeholder="Nickname">
                <input type="email" id="r-email" placeholder="Student Email">
                <input type="password" id="r-pass" placeholder="Password">
                <button class="btn" id="submit-req">SEND REQUEST</button>
                <p onclick="toggleReg(false)" style="margin-top:15px; font-size:11px; color:#888; cursor:pointer;">Back</p>
            </div>
        </div>
    </div>

    <div id="portal">
        <div id="nav">
            <b style="color:var(--accent)">M-TOOL</b>
            <span onclick="tab('home')" style="cursor:pointer">Tool</span>
            <span id="admin-link" style="display:none; color:gold; cursor:pointer" onclick="tab('admin')">Console</span>
            <div style="flex:1"></div>
            <button onclick="location.reload()" style="background:none; border:none; color:red; cursor:pointer;">LOGOUT</button>
        </div>
        <div id="v-home" class="view active">
            <iframe src="https://harrythehacker.neocities.org/Calculator" style="width:100%; height:100%; border:none;"></iframe>
        </div>
        <div id="v-admin" class="view">
            <h2>Requests</h2>
            <div id="request-list"></div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, deleteDoc, collection, onSnapshot, serverTimestamp, addDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // DOUBLE CHECK THESE THREE LINES
        const firebaseConfig = {
            apiKey: "AIzaSyD5TALVIdPm5P8RuKjINsOmKW1XrK53u1Q",
            projectId: "testing-12bc9", 
            appId: "1:626782607651:web:c5980863cef82d904a5496"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // BYPASS: 5 second hold
        let timer;
        const decoy = document.getElementById('decoy');
        const showAuth = () => { decoy.style.display='none'; document.getElementById('auth-overlay').style.display='flex'; };
        decoy.onmousedown = () => timer = setTimeout(showAuth, 5000);
        decoy.ontouchstart = () => timer = setTimeout(showAuth, 5000);
        decoy.onmouseup = () => clearTimeout(timer);

        window.toggleReg = (s) => {
            document.getElementById('login-view').style.display = s ? 'none' : 'block';
            document.getElementById('reg-view').style.display = s ? 'block' : 'none';
        };

        window.tab = (id) => {
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            document.getElementById('v-'+id).classList.add('active');
        };

        // REQUEST SUBMIT
        document.getElementById('submit-req').onclick = async () => {
            const u = document.getElementById('r-user').value;
            const e = document.getElementById('r-email').value;
            const p = document.getElementById('r-pass').value;
            
            try {
                const docRef = await addDoc(collection(db, "requests"), {
                    username: u, email: e, pass: p, time: serverTimestamp()
                });
                alert("Sent! ID: " + docRef.id);
                window.toggleReg(false);
            } catch (err) {
                alert("Error: " + err.message);
            }
        };

        // ADMIN LOADER
        function loadAdmin() {
            onSnapshot(collection(db, "requests"), (snap) => {
                const list = document.getElementById('request-list');
                list.innerHTML = "";
                snap.forEach(d => {
                    const data = d.data();
                    list.innerHTML += `<div class="node">
                        <b>${data.username}</b> (${data.email})<br>Pass: ${data.pass}
                        <button onclick="window.delReq('${d.id}')" style="float:right; color:red; border:none; background:none; cursor:pointer;">Delete</button>
                    </div>`;
                });
            });
        }
        window.delReq = async (id) => { await deleteDoc(doc(db, "requests", id)); };

        // LOGIN
        document.getElementById('login-btn').onclick = async () => {
            const u = document.getElementById('l-user').value;
            const p = document.getElementById('l-pass').value;
            const email = u.includes('@') ? u : u + "@mtool.local";
            try {
                await signInWithEmailAndPassword(auth, email, p);
            } catch { alert("Failed"); }
        };

        onAuthStateChanged(auth, (user) => {
            if(user) {
                document.getElementById('auth-overlay').style.display = 'none';
                document.getElementById('portal').style.display = 'flex';
                if(user.email === "hjass2865@gmail.com") {
                    document.getElementById('admin-link').style.display = 'inline';
                    loadAdmin();
                }
            }
        });
    </script>
</body>
</html>
