<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 Not Found</title>
    <link id="fav" rel="shortcut icon" type="image/png" href="https://www.google.com/favicon.ico">
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <style>
        :root {
            --theme-bg: #0b0b18;
            --theme-accent: #7c3aed;
            --theme-accent-2: #4f46e5;
            --theme-glow-1: rgba(124,58,237,0.15);
            --theme-glow-2: rgba(79,70,229,0.1);
            --theme-muted: #8078a8;
            --theme-muted-2: #6058a0;
            --theme-accent-10: rgba(124,58,237,0.1);
            --theme-accent-40: rgba(124,58,237,0.4);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, system-ui, sans-serif; }
        
        /* --- 404 DECOY --- */
        #decoy-body { background: #fff; color: #000; height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 10001; position: relative; }
        .n-text { font-size: 24px; font-weight: 500; border-right: 1px solid #ccc; padding-right: 20px; margin-right: 20px; }
        .m-text { font-size: 14px; }

        /* --- LOGIN UI --- */
        #login-overlay {
            display: none; position: fixed; inset: 0; z-index: 10000;
            background: var(--theme-bg);
            background-image: radial-gradient(circle at 20% 30%, var(--theme-glow-1) 0%, transparent 50%),
                              radial-gradient(circle at 80% 70%, var(--theme-glow-2) 0%, transparent 50%);
            align-items: center; justify-content: center;
        }
        .login-card {
            width: 90%; max-width: 420px; padding: 45px; background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 28px;
            box-shadow: 0 40px 100px rgba(0,0,0,0.8); backdrop-filter: blur(30px); text-align: center; color: #e5e3ff;
        }
        input, textarea { width: 100%; padding: 15px; margin-bottom: 15px; background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08); border-radius: 14px; color: #fff; outline: none; }
        .submit-btn { width: 100%; padding: 15px; border: none; border-radius: 14px; background: linear-gradient(135deg, var(--theme-accent), var(--theme-accent-2)); color: white; font-weight: 700; cursor: pointer; transition: 0.3s; }

        /* --- PORTAL UI --- */
        #portal { display: none; position: fixed; inset: 0; flex-direction: column; background: var(--theme-bg); z-index: 999; }
        #nav { height: 65px; background: rgba(0,0,0,0.5); border-bottom: 1px solid rgba(255,255,255,0.06); display: flex; align-items: center; padding: 0 25px; gap: 10px; }
        .nav-btn { padding: 9px 16px; border-radius: 10px; border: 1px solid transparent; background: transparent; color: var(--theme-muted); cursor: pointer; font-size: 14px; font-weight: 600; }
        .nav-btn.on { background: var(--theme-accent-10); color: var(--theme-accent); border-color: var(--theme-accent-40); }
        .view { display: none; width: 100%; height: 100%; overflow: hidden; }
        .view.on { display: flex; flex-direction: column; }
        iframe { width: 100%; height: 100%; border: none; }
        
        /* Monitor Badge */
        .online-badge { padding: 8px 15px; background: rgba(124,58,237,0.1); border: 1px solid var(--theme-accent); border-radius: 10px; color: #fff; font-size: 12px; display: flex; align-items: center; gap: 6px; }
        .dot { width: 7px; height: 7px; background: #10b981; border-radius: 50%; box-shadow: 0 0 8px #10b981; }
    </style>
</head>
<body>

    <div id="decoy-body">
        <div><span class="n-text">404</span><span class="m-text">Not Found</span></div>
    </div>

    <div id="login-overlay">
        <div class="login-card">
            <h1>System Login</h1>
            <div id="login-form" style="margin-top:20px;">
                <input type="email" id="email" placeholder="Email">
                <input type="password" id="pass" placeholder="Password">
                <button class="submit-btn" id="login-btn">Sign In</button>
                <p style="font-size:12px; margin-top:15px; cursor:pointer;" onclick="toggleAuth(true)">Request Access</p>
            </div>
            <div id="request-form" style="display:none; margin-top:20px;">
                <input type="text" id="req-user" placeholder="Username">
                <input type="email" id="req-email" placeholder="Email">
                <input type="password" id="req-pass" placeholder="Desired Password">
                <textarea id="req-note" rows="2" placeholder="Note to Admin"></textarea>
                <button class="submit-btn" id="req-btn">Send Request</button>
                <p style="font-size:12px; margin-top:15px; cursor:pointer;" onclick="toggleAuth(false)">Back to Login</p>
            </div>
        </div>
    </div>

    <div id="portal">
        <div id="nav">
            <div style="font-weight: 900; color: var(--theme-accent); margin-right: 20px;">M-TOOL</div>
            <button class="nav-btn on" onclick="showTab('home', this)">Home</button>
            <button class="nav-btn" onclick="showTab('monitor', this)">Monitor</button>
            <button class="nav-btn" onclick="showTab('games', this)">Games</button>
            <button class="nav-btn" onclick="showTab('ixl', this)">IXL</button>
            <div style="flex:1"></div>
            <div id="profile-display" style="color: var(--theme-accent); font-size: 12px; font-weight: 700; margin-right: 15px;">GUEST</div>
            <div id="clock" style="font-family: monospace; color: var(--theme-muted-2); font-size: 12px;">00:00:00</div>
        </div>

        <div id="main" style="flex:1; overflow:hidden;">
            <div class="view on" id="v-home"><iframe id="f-home"></iframe></div>
            <div class="view" id="v-monitor" style="padding:40px;">
                <h2 style="color:#fff; margin-bottom:20px;">Live Users</h2>
                <div id="online-list" style="display:flex; gap:10px; flex-wrap:wrap;"></div>
            </div>
            <div class="view" id="v-games"><iframe id="f-games"></iframe></div>
            <div class="view" id="v-ixl"><iframe id="f-ixl"></iframe></div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, doc, getDoc, setDoc, query, where, onSnapshot, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyD5TALVIdPm5P8RuKjINsOmKW1XrK53u1Q",
            authDomain: "testing-12bc9.firebaseapp.com",
            projectId: "testing-12bc9",
            storageBucket: "testing-12bc9.firebasestorage.app",
            messagingSenderId: "626782607651",
            appId: "1:626782607651:web:c5980863cef82d904a5496"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        emailjs.init("6iGADKihYbPC4ecb_");

        // --- MONITORING LOGIC ---
        const startMonitor = () => {
            const q = query(collection(db, "active_sessions"), where("isOnline", "==", true));
            onSnapshot(q, (snap) => {
                const list = document.getElementById('online-list');
                list.innerHTML = "";
                snap.forEach(d => {
                    const el = document.createElement('div');
                    el.className = "online-badge";
                    el.innerHTML = `<div class="dot"></div> ${d.data().username || 'User'}`;
                    list.appendChild(el);
                });
            });
        };

        // --- LOGIN ---
        document.getElementById('login-btn').onclick = async () => {
            const email = document.getElementById('email').value;
            try {
                const userCred = await signInWithEmailAndPassword(auth, email, document.getElementById('pass').value);
                const uid = userCred.user.uid;
                const sessionRef = doc(db, "active_sessions", uid);
                
                const snap = await getDoc(sessionRef);
                if (snap.exists() && snap.data().isOnline === true) {
                    alert("Account already in use."); signOut(auth); return;
                }

                await setDoc(sessionRef, { isOnline: true, username: email.split('@')[0], lastActive: serverTimestamp() });
                
                document.getElementById('login-overlay').style.display = 'none';
                document.getElementById('portal').style.display = 'flex';
                document.getElementById('f-home').src = "https://calcsolver.github.io/Beairgubvgiagnvprngdb-rkagdfxbak-gdinbrsgdbuitkud/";
                document.getElementById('profile-display').innerText = email.split('@')[0].toUpperCase();
                
                startMonitor();
                window.addEventListener('beforeunload', () => setDoc(sessionRef, { isOnline: false }));
            } catch (e) { alert("Denied."); }
        };

        // --- REQUEST ---
        document.getElementById('req-btn').onclick = async () => {
            const user = document.getElementById('req-user').value;
            const email = document.getElementById('req-email').value;
            const pass = document.getElementById('req-pass').value;
            if(!user || !email || !pass) return alert("Fill all fields.");

            await addDoc(collection(db, "requests"), { username: user, email, password: pass, time: new Date() });
            emailjs.send("service_06y4hgi", "template_425sz3c", { username: user, user_email: email, user_pass: pass, message: document.getElementById('req-note').value })
            .then(() => { alert("Sent!"); location.reload(); });
        };
    </script>

    <script>
        document.onkeydown = (e) => {
            if(e.ctrlKey && e.key === 'x') {
                e.preventDefault();
                document.getElementById('decoy-body').style.display = 'none';
                document.getElementById('login-overlay').style.display = 'flex';
            }
        };
        function toggleAuth(req) {
            document.getElementById('login-form').style.display = req ? 'none' : 'block';
            document.getElementById('request-form').style.display = req ? 'block' : 'none';
        }
        function showTab(id, b) {
            document.querySelectorAll('.view').forEach(v => v.classList.remove('on'));
            document.querySelectorAll('.nav-btn').forEach(btn => btn.classList.remove('on'));
            document.getElementById('v-' + id).classList.add('on');
            b.classList.add('on');
            if(id === 'games') document.getElementById('f-games').src = "https://calcsolver.github.io/";
            if(id === 'ixl') document.getElementById('f-ixl').src = "https://ixlmath.nwpa.com.au/";
        }
        setInterval(() => { document.getElementById('clock').innerText = new Date().toLocaleTimeString(); }, 1000);
    </script>
</body>
</html>
