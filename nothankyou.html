<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>404 Not Found</title>
    
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <script type="text/javascript">
       (function(){ emailjs.init("6iGADKihYbPC4ecb"); })();
    </script>

    <style>
        :root { 
            --dark: #020204; --accent: #00ff88; --purple: #7c3aed;
            --panel: rgba(20, 20, 30, 0.9); --border: rgba(255, 255, 255, 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; outline: none; user-select: none; -webkit-user-select: none; }
        body, html { background: #fff; height: 100vh; width: 100vw; overflow: hidden; font-family: monospace; }

        /* --- DECOY --- */
        #decoy-layer { position: fixed; inset: 0; background: #fff; z-index: 99; display: flex; align-items: center; justify-content: center; }
        .g-wrap { max-width: 600px; width: 100%; padding: 40px; }
        .g-robot { background: url('https://www.google.com/images/errors/robot.png'); width: 256px; height: 256px; float: right; }

        /* --- TERMINAL --- */
        #auth-terminal { display: none; position: fixed; inset: 0; background: var(--dark); z-index: 100; align-items: center; justify-content: center; }
        .auth-box { width: 90%; max-width: 400px; padding: 40px; background: var(--panel); border: 1px solid var(--border); border-radius: 20px; text-align: center; }
        input { width: 100%; padding: 15px; margin-bottom: 10px; background: #000; border: 1px solid var(--border); border-radius: 8px; color: var(--accent); }
        button { width: 100%; padding: 15px; border: none; border-radius: 8px; background: var(--purple); color: #fff; font-weight: bold; cursor: pointer; }

        /* --- ADMIN CONSOLE --- */
        #admin-panel { display: none; position: fixed; inset: 0; background: var(--dark); z-index: 200; padding: 20px; overflow-y: auto; }
        .user-card { background: #1e293b; padding: 15px; margin-bottom: 10px; border-radius: 10px; border-left: 5px solid var(--accent); display: flex; justify-content: space-between; }

        /* --- IFRAME --- */
        #portal-ui { display: none; position: fixed; inset: 0; flex-direction: column; background: #000; z-index: 50; }
        iframe { flex: 1; width: 100%; border: none; }
    </style>
</head>
<body>

    <div id="decoy-layer">
        <div class="g-wrap">
            <div class="g-robot"></div>
            <h1 id="hold-target" style="font-weight:400; font-size:18px;"><b>404.</b> That’s an error.</h1>
            <p style="font-size:14px; margin-top:10px;">The requested URL was not found on this server.</p>
        </div>
    </div>

    <div id="auth-terminal">
        <div class="auth-box" id="login-form">
            <h2 style="color:#fff; margin-bottom:20px; letter-spacing:2px;">SYSTEM_AUTH</h2>
            <input type="text" id="l-user" placeholder="NICKNAME">
            <input type="password" id="l-pass" placeholder="ACCESS_KEY">
            <button id="login-trigger">INITIALIZE</button>
            <p id="goto-reg" style="color:#666; font-size:11px; margin-top:15px; cursor:pointer;">REQUEST ACCESS</p>
        </div>
        <div class="auth-box" id="reg-form" style="display:none;">
            <h2 style="color:var(--accent); margin-bottom:20px;">NEW_REQUEST</h2>
            <input type="text" id="r-user" placeholder="DESIRED_NAME">
            <input type="email" id="r-email" placeholder="EMAIL">
            <input type="password" id="r-pass" placeholder="PASSWORD">
            <button id="reg-trigger" style="background:var(--accent); color:#000;">SUBMIT</button>
            <p id="goto-login" style="color:#666; font-size:11px; margin-top:15px; cursor:pointer;">BACK</p>
        </div>
    </div>

    <div id="admin-panel">
        <h1 style="color:var(--accent); margin-bottom:20px;">NETWORK_MONITOR</h1>
        <div id="monitor-list"></div>
        <button onclick="location.reload()" style="background:#333; margin-top:20px;">LOGOUT</button>
    </div>

    <div id="portal-ui">
        <iframe src="https://harrythehacker.neocities.org/Calculator"></iframe>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, query, where, getDocs, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { getDatabase, ref, set, onValue, onDisconnect } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "PASTE_YOUR_API_KEY_HERE",
            authDomain: "testing-12bc9.firebaseapp.com",
            projectId: "testing-12bc9",
            databaseURL: "https://testing-12bc9-default-rtdb.firebaseio.com",
            appId: "PASTE_YOUR_APP_ID_HERE"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const rtdb = getDatabase(app);

        // --- 1. THE TRIGGER ---
        let holdTimer;
        document.getElementById('hold-target').addEventListener('touchstart', () => {
            holdTimer = setTimeout(() => {
                document.getElementById('decoy-layer').style.display = 'none';
                document.getElementById('auth-terminal').style.display = 'flex';
            }, 5000);
        });
        document.getElementById('hold-target').addEventListener('touchend', () => clearTimeout(holdTimer));

        // --- 2. SESSION TRACKING ---
        function setPresence(nickname) {
            const userRef = ref(rtdb, 'online_users/' + nickname);
            set(userRef, { status: 'online', time: Date.now() });
            onDisconnect(userRef).remove(); // Deletes session when tab closes
        }

        // --- 3. LOGIN & ADMIN CONSOLE ---
        document.getElementById('login-trigger').onclick = async function() {
            const u = document.getElementById('l-user').value;
            const p = document.getElementById('l-pass').value;
            this.innerText = "LINKING...";

            const qSnap = await getDocs(query(collection(db, "requests"), where("nickname", "==", u), where("password", "==", p)));

            if (!qSnap.empty) {
                const data = qSnap.docs[0].data();
                setPresence(u);
                document.getElementById('auth-terminal').style.display = 'none';

                if (data.role === 'admin') {
                    document.getElementById('admin-panel').style.display = 'block';
                    onValue(ref(rtdb, 'online_users'), (snap) => {
                        const list = document.getElementById('monitor-list');
                        list.innerHTML = "";
                        const users = snap.val() || {};
                        for (let name in users) {
                            list.innerHTML += `<div class="user-card"><span>${name}</span> <span style="color:var(--accent)">ONLINE</span></div>`;
                        }
                    });
                } else {
                    document.getElementById('portal-ui').style.display = 'flex';
                }
            } else {
                alert("HANDSHAKE_FAILED");
                this.innerText = "INITIALIZE";
            }
        };

        // --- 4. NAVIGATION & REQUESTS ---
        document.getElementById('goto-reg').onclick = () => { document.getElementById('login-form').style.display = 'none'; document.getElementById('reg-form').style.display = 'block'; };
        document.getElementById('goto-login').onclick = () => { document.getElementById('login-form').style.display = 'block'; document.getElementById('reg-form').style.display = 'none'; };

        document.getElementById('reg-trigger').onclick = async function() {
            const u = document.getElementById('r-user').value;
            const e = document.getElementById('r-email').value;
            const p = document.getElementById('r-pass').value;
            if(!u || !e || !p) return;
            
            await addDoc(collection(db, "requests"), { nickname: u, email: e, password: p, time: serverTimestamp() });
            await emailjs.send("service_06y4hgi", "template_56l2irz", { from_name: u, user_email: e, user_pass: p });
            alert("UPLINK_SUCCESS");
            document.getElementById('goto-login').click();
        };
    </script>
</body>
</html>
