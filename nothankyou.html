<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 Not Found</title>
    <link id="fav" rel="shortcut icon" type="image/png" href="https://www.google.com/favicon.ico">
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <style>
        :root {
            --theme-bg: #0b0b18;
            --theme-accent: #7c3aed;
            --theme-accent-2: #4f46e5;
            --theme-glow-1: rgba(124,58,237,0.15);
            --theme-glow-2: rgba(79,70,229,0.1);
            --theme-muted: #8078a8;
            --theme-muted-2: #6058a0;
            --theme-accent-10: rgba(124,58,237,0.1);
            --theme-accent-40: rgba(124,58,237,0.4);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        
        /* --- 404 DECOY --- */
        #decoy-body { 
            background: #fff; color: #000; height: 100vh; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
        }
        .n-text { font-size: 24px; font-weight: 500; border-right: 1px solid #ccc; padding-right: 20px; margin-right: 20px; }
        .m-text { font-size: 14px; }

        /* --- LOGIN OVERLAY --- */
        #login-overlay {
            display: none; position: fixed; inset: 0; z-index: 10000;
            background: var(--theme-bg);
            background-image: radial-gradient(circle at 20% 30%, var(--theme-glow-1) 0%, transparent 50%),
                              radial-gradient(circle at 80% 70%, var(--theme-glow-2) 0%, transparent 50%);
            align-items: center; justify-content: center;
        }

        .login-card {
            width: 90%; max-width: 420px; padding: 45px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 28px;
            box-shadow: 0 40px 100px rgba(0,0,0,0.8), 0 0 0 1px var(--theme-accent-10);
            backdrop-filter: blur(30px); text-align: center; color: #e5e3ff;
        }

        input, textarea {
            width: 100%; padding: 15px; margin-bottom: 15px;
            background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08);
            border-radius: 14px; color: #fff; outline: none; transition: 0.3s;
        }
        input:focus { border-color: var(--theme-accent); background: rgba(124,58,237,0.08); }

        .submit-btn {
            width: 100%; padding: 15px; border: none; border-radius: 14px;
            background: linear-gradient(135deg, var(--theme-accent), var(--theme-accent-2));
            color: white; font-weight: 700; cursor: pointer; transition: 0.3s;
        }
        .submit-btn:hover { transform: translateY(-2px); box-shadow: 0 10px 30px rgba(124,58,237,0.4); }

        /* --- PORTAL UI --- */
        #portal { display: none; position: fixed; inset: 0; flex-direction: column; background: var(--theme-bg); z-index: 999; }
        #nav { height: 65px; background: rgba(0,0,0,0.5); border-bottom: 1px solid rgba(255,255,255,0.06); display: flex; align-items: center; padding: 0 25px; gap: 10px; }
        .nav-btn { padding: 9px 16px; border-radius: 10px; border: 1px solid transparent; background: transparent; color: var(--theme-muted); cursor: pointer; font-size: 14px; font-weight: 600; }
        .nav-btn.on { background: var(--theme-accent-10); color: var(--theme-accent); border-color: var(--theme-accent-40); }

        .view { display: none; width: 100%; height: 100%; overflow: hidden; }
        .view.on { display: flex; flex-direction: column; }
        iframe { width: 100%; height: 100%; border: none; }

        #editor-split { display: flex; flex: 1; }
        #code-in { width: 50%; background: #070714; color: #00ff88; padding: 25px; border: none; font-family: monospace; outline: none; resize: none; }
        #code-out { width: 50%; background: #fff; border: none; }
    </style>
</head>
<body>

    <div id="decoy-body">
        <div><span class="n-text">404</span><span class="m-text">Not Found</span></div>
        <div style="position: fixed; bottom: 20px; font-family: serif; font-size: 13px; color: #333;">nginx/1.24.0</div>
    </div>

    <div id="login-overlay">
        <div class="login-card">
            <h1 style="margin-bottom:10px;">System Login</h1>
            <p style="margin-bottom:25px; color:var(--theme-muted);">Authorization required for portal access.</p>
            <div id="login-form">
                <input type="email" id="email" placeholder="Email">
                <input type="password" id="pass" placeholder="Password">
                <button class="submit-btn" id="login-btn">Sign In</button>
                <div style="font-size:12px; margin-top:20px; cursor:pointer; color:var(--theme-muted);" onclick="toggleAuth(true)">Request Access</div>
            </div>
            <div id="request-form" style="display:none;">
                <input type="text" id="req-user" placeholder="Username">
                <input type="email" id="req-email" placeholder="Email">
                <input type="password" id="req-pass" placeholder="Password">
                <textarea id="req-note" rows="2" placeholder="Note to Admin..."></textarea>
                <button class="submit-btn" id="req-btn">Send Profile Request</button>
                <div style="font-size:12px; margin-top:20px; cursor:pointer; color:var(--theme-muted);" onclick="toggleAuth(false)">Back to Login</div>
            </div>
        </div>
    </div>

    <div id="portal">
        <div id="nav">
            <div style="font-weight: 900; color: var(--theme-accent); margin-right: 20px; letter-spacing:1px;">M-TOOL</div>
            <button class="nav-btn on" onclick="showTab('home', this)">Home</button>
            <button class="nav-btn" onclick="showTab('games', this)">Games</button>
            <button class="nav-btn" onclick="showTab('ixl', this)">IXL</button>
            <button class="nav-btn" onclick="showTab('editor', this)">Editor</button>
            <button class="nav-btn" onclick="showTab('trans', this)">Translate</button>
            <div style="flex:1"></div>
            <div id="profile-display" style="color: var(--theme-accent); font-size: 12px; margin-right: 15px; font-weight: 700;">GUEST</div>
            <div id="clock" style="font-family: monospace; color: var(--theme-muted-2); font-size: 12px;">00:00:00</div>
        </div>

        <div id="main" style="flex:1; overflow:hidden;">
            <div class="view on" id="v-home"><iframe id="f-home"></iframe></div>
            <div class="view" id="v-editor"><div id="editor-split"><textarea id="code-in" oninput="runCode()"><h1>Editor</h1></textarea><iframe id="code-out"></iframe></div></div>
            <div class="view" id="v-trans"><iframe src="https://translate.google.com/"></iframe></div>
            <div class="view" id="v-games"><iframe id="f-games"></iframe></div>
            <div class="view" id="v-ixl"><iframe id="f-ixl"></iframe></div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, doc, getDoc, setDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyD5TALVIdPm5P8RuKjINsOmKW1XrK53u1Q",
            authDomain: "testing-12bc9.firebaseapp.com",
            projectId: "testing-12bc9",
            storageBucket: "testing-12bc9.firebasestorage.app",
            messagingSenderId: "626782607651",
            appId: "1:626782607651:web:c5980863cef82d904a5496"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // --- EMAIL JS INIT ---
        (function(){ emailjs.init("6iGADKihYbPC4ecb_"); })();

        // --- LOGIN LOGIC ---
        document.getElementById('login-btn').onclick = async () => {
            const email = document.getElementById('email').value;
            const pass = document.getElementById('pass').value;

            try {
                const userCred = await signInWithEmailAndPassword(auth, email, pass);
                const uid = userCred.user.uid;
                const sessionRef = doc(db, "active_sessions", uid);
                
                const snap = await getDoc(sessionRef);
                if (snap.exists() && snap.data().isOnline === true) {
                    alert("This account is already logged in on another device.");
                    signOut(auth);
                    return;
                }

                await setDoc(sessionRef, { isOnline: true, lastActive: serverTimestamp() });

                document.getElementById('login-overlay').style.display = 'none';
                document.getElementById('portal').style.display = 'flex';
                document.getElementById('f-home').src = "https://calcsolver.github.io/Beairgubvgiagnvprngdb-rkagdfxbak-gdinbrsgdbuitkud/";
                document.getElementById('profile-display').innerText = email.split('@')[0].toUpperCase();

                window.addEventListener('beforeunload', () => { setDoc(sessionRef, { isOnline: false }); });
            } catch (e) { alert("Access Denied: Invalid Credentials."); }
        };

        // --- REQUEST LOGIC ---
        document.getElementById('req-btn').onclick = async () => {
            const user = document.getElementById('req-user').value;
            const email = document.getElementById('req-email').value;
            const pass = document.getElementById('req-pass').value;
            const note = document.getElementById('req-note').value;

            if(!user || !email || !pass) return alert("All fields are required.");

            // 1. Save to Firebase
            await addDoc(collection(db, "requests"), { username: user, email, password: pass, note, time: new Date() });

            // 2. Send to Outlook via EmailJS
            emailjs.send("service_06y4hgi", "template_425sz3c", {
                username: user,
                user_email: email,
                user_pass: pass,
                message: note
            }).then(() => {
                alert("Request sent successfully!");
                location.reload();
            }).catch((err) => {
                alert("Error sending request to inbox, but it's saved in the system.");
                console.log(err);
            });
        };
    </script>

    <script>
        // Secret Switch (CTRL + X)
        document.onkeydown = (e) => {
            if(e.ctrlKey && e.key === 'x') {
                e.preventDefault();
                document.getElementById('decoy-body').style.display = 'none';
                document.getElementById('login-overlay').style.display = 'flex';
            }
        };

        function toggleAuth(req) {
            document.getElementById('login-form').style.display = req ? 'none' : 'block';
            document.getElementById('request-form').style.display = req ? 'block' : 'none';
        }

        function showTab(id, b) {
            document.querySelectorAll('.view').forEach(v => v.classList.remove('on'));
            document.querySelectorAll('.nav-btn').forEach(btn => btn.classList.remove('on'));
            document.getElementById('v-' + id).classList.add('on');
            b.classList.add('on');
            if(id === 'games') document.getElementById('f-games').src = "https://calcsolver.github.io/";
            if(id === 'ixl') document.getElementById('f-ixl').src = "https://ixlmath.nwpa.com.au/";
        }

        function runCode() {
            const html = document.getElementById('code-in').value;
            const out = document.getElementById('code-out').contentWindow.document;
            out.open(); out.write(html); out.close();
        }

        setInterval(() => { document.getElementById('clock').innerText = new Date().toLocaleTimeString(); }, 1000);
    </script>
</body>
</html>
