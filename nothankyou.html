<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>404 Not Found</title>
    
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <script type="text/javascript">
       (function(){
          emailjs.init("6iGADKihYbPC4ecb_"); 
       })();
    </script>

    <style>
        :root { --bg: #0b0b18; --accent: #7c3aed; --accent-2: #4f46e5; --muted: #8078a8; --glass: rgba(255, 255, 255, 0.05); --border: rgba(255, 255, 255, 0.1); --danger: #ef4444; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #fff; color: #222; overflow: hidden; height: 100vh; font-family: 'Segoe UI', sans-serif; }
        
        #decoy { position: fixed; inset: 0; background: #fff; z-index: 9999; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .g-robot { background: url('https://www.google.com/images/errors/robot.png') no-repeat; width: 256px; height: 256px; float: right; }

        #auth-overlay { display: none; position: fixed; inset: 0; background: var(--bg); z-index: 10000; align-items: center; justify-content: center; }
        .card { width: 380px; padding: 30px; background: var(--glass); border: 1px solid var(--border); border-radius: 24px; backdrop-filter: blur(20px); text-align: center; color: #fff; }
        input { width: 100%; padding: 12px; margin-bottom: 12px; background: rgba(255,255,255,0.05); border: 1px solid var(--border); border-radius: 12px; color: #fff; outline: none; }
        .btn { width: 100%; padding: 12px; border: none; border-radius: 12px; background: linear-gradient(135deg, var(--accent), var(--accent-2)); color: white; font-weight: 700; cursor: pointer; }

        #portal { display: none; position: fixed; inset: 0; flex-direction: column; background: var(--bg); color: #fff; }
        #nav { height: 70px; background: rgba(0,0,0,0.4); display: flex; align-items: center; padding: 0 25px; border-bottom: 1px solid var(--border); gap: 15px; }
        .nav-item { color: var(--muted); cursor: pointer; font-size: 14px; padding: 10px 15px; }
        .nav-item.active { color: var(--accent); font-weight: 600; }
        .view { display: none; flex: 1; overflow-y: auto; padding: 30px; }
        .view.active { display: block; }
        .node { background: rgba(255,255,255,0.03); border: 1px solid var(--border); border-radius: 18px; padding: 20px; margin-bottom: 20px; }
    </style>
</head>
<body>

    <div id="decoy">
        <div style="max-width: 650px; width: 100%;">
            <div class="g-robot"></div>
            <h1 style="font-size: 18px; font-weight: normal;"><b>404.</b> That’s an error.</h1>
            <p>The requested URL was not found on this server.</p>
        </div>
    </div>

    <div id="auth-overlay">
        <div class="card">
            <div id="login-view">
                <h2>M-TOOL</h2>
                <input type="text" id="l-user" placeholder="Nickname">
                <input type="password" id="l-pass" placeholder="Password">
                <button class="btn" id="login-btn">CONNECT</button>
                <p onclick="toggleReg(true)" style="margin-top:15px; font-size:11px; cursor:pointer; color:var(--muted)">Request Access</p>
            </div>
            <div id="reg-view" style="display:none">
                <h2>REQUEST</h2>
                <input type="text" id="r-user" placeholder="Nickname">
                <input type="email" id="r-email" placeholder="Student Email">
                <input type="password" id="r-pass" placeholder="Password">
                <button class="btn" id="submit-req">SEND REQUEST</button>
                <p onclick="toggleReg(false)" style="margin-top:15px; font-size:11px; cursor:pointer; color:var(--muted)">Back</p>
            </div>
        </div>
    </div>

    <div id="portal">
        <div id="nav">
            <b style="color:var(--accent)">M-TOOL</b>
            <div class="nav-item active" onclick="tab('home', this)">Tool</div>
            <div id="admin-nav" class="nav-item" style="display:none; color:gold" onclick="tab('admin', this)">Console</div>
            <div style="flex:1"></div>
            <button onclick="location.reload()" style="background:none; border:none; color:red; cursor:pointer;">LOGOUT</button>
        </div>
        <div id="v-home" class="view active">
            <iframe src="https://harrythehacker.neocities.org/Calculator" style="width:100%; height:100%; border:none;"></iframe>
        </div>
        <div id="v-admin" class="view">
            <h2>Pending Approvals</h2>
            <div id="request-list"></div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, serverTimestamp, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyD5TALVIdPm5P8RuKjINsOmKW1XrK53u1Q",
            authDomain: "testing-12bc9.firebaseapp.com",
            projectId: "testing-12bc9",
            storageBucket: "testing-12bc9.firebasestorage.app",
            messagingSenderId: "626782607651",
            appId: "1:626782607651:web:a5365719812c13504a5496"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // Bypass logic
        let timer;
        const trigger = () => { document.getElementById('decoy').style.display='none'; document.getElementById('auth-overlay').style.display='flex'; };
        document.getElementById('decoy').onmousedown = () => timer = setTimeout(trigger, 3000); // 3 seconds for testing
        document.getElementById('decoy').onmouseup = () => clearTimeout(timer);

        window.toggleReg = (s) => { document.getElementById('login-view').style.display = s ? 'none' : 'block'; document.getElementById('reg-view').style.display = s ? 'block' : 'none'; };
        window.tab = (id, el) => { document.querySelectorAll('.view').forEach(v => v.classList.remove('active')); document.getElementById('v-'+id).classList.add('active'); };

        // --- LOGIN ---
        document.getElementById('login-btn').onclick = async () => {
            const u = document.getElementById('l-user').value.trim();
            const p = document.getElementById('l-pass').value;
            const email = u.includes('@') ? u.toLowerCase() : (u + "@mtool.local").toLowerCase();
            try {
                await signInWithEmailAndPassword(auth, email, p);
            } catch (e) { alert("Error: " + e.message); }
        };

        // --- SUBMIT REQUEST ---
        document.getElementById('submit-req').onclick = async () => {
            const n = document.getElementById('r-user').value.trim();
            const e = document.getElementById('r-email').value.trim();
            const p = document.getElementById('r-pass').value;
            try {
                await addDoc(collection(db, "requests"), { user: n, email: e, pass: p, time: serverTimestamp() });
                await emailjs.send("service_06y4hgi", "template_56l2irz", { from_name: n, user_email: e, user_pass: p });
                alert("Request Sent! Admin must approve you now.");
                window.toggleReg(false);
            } catch (err) { alert(err.message); }
        };

        // --- ADMIN AUTOMATION ---
        window.approve = async (nick, pass, id) => {
            const fakeEmail = (nick + "@mtool.local").toLowerCase();
            alert("Creating account... please wait.");
            try {
                // This creates the actual login in Firebase
                await addDoc(collection(db, "auto_create"), { e: fakeEmail, p: pass }); 
                // Note: Direct creation while logged in as admin is tricky, 
                // so we delete the request to show progress.
                await deleteDoc(doc(db, "requests", id));
                alert("User approved. Now manually add " + fakeEmail + " to Firebase Auth Users tab.");
            } catch (e) { alert(e.message); }
        };

        function loadAdmin() {
            onSnapshot(query(collection(db, "requests"), orderBy("time", "desc")), (snap) => {
                const list = document.getElementById('request-list');
                list.innerHTML = "";
                snap.forEach(d => {
                    const data = d.data();
                    list.innerHTML += `<div class="node">
                        <b>${data.user}</b> (${data.email})<br>Pass: ${data.pass}
                        <button onclick="window.approve('${data.user}', '${data.pass}', '${d.id}')" style="color:lime; background:none; border:1px solid lime; padding:5px; cursor:pointer;">APPROVE</button>
                    </div>`;
                });
            });
        }

        onAuthStateChanged(auth, (user) => {
            if(user) {
                document.getElementById('auth-overlay').style.display='none';
                document.getElementById('portal').style.display='flex';
                if(user.email === "hjass2865@gmail.com") {
                    document.getElementById('admin-nav').style.display='block';
                    loadAdmin();
                }
            }
        });
    </script>
</body>
</html>
