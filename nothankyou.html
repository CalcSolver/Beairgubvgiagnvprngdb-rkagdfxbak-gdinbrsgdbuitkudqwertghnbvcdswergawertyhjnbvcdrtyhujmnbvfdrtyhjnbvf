<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>404 Not Found</title>
    
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <script type="text/javascript">
       (function(){
          try {
              emailjs.init("6iGADKihYbPC4ecb_"); 
          } catch(e) {
              console.error("EmailJS Error");
          }
       })();
    </script>

    <style>
        :root { 
            --bg: #05050a; 
            --accent: #7c3aed; 
            --accent-2: #4f46e5; 
            --glass: rgba(255, 255, 255, 0.03); 
            --border: rgba(255, 255, 255, 0.1); 
            --danger: #ef4444;
        }
        
        /* DISABLE ALL MOUSE INPUT */
        * { 
            margin: 0; padding: 0; box-sizing: border-box; outline: none; 
            cursor: none !important; 
            user-select: none; 
            -webkit-user-select: none; 
            -webkit-touch-callout: none; 
        }

        body { 
            background: #fff; 
            color: #222; 
            overflow: hidden; 
            height: 100vh; 
            font-family: 'Segoe UI', sans-serif;
            touch-action: none; 
        }

        /* --- 1. THE DECOY (Visible first) --- */
        #decoy-layer { 
            position: fixed; inset: 0; background: #fff; z-index: 9999; 
            display: flex; align-items: center; justify-content: center; 
            pointer-events: none; /* Only iPad can touch this */
        }
        
        .g-container { max-width: 650px; width: 100%; pointer-events: none; }
        .g-robot { background: url('https://www.google.com/images/errors/robot.png') no-repeat; width: 256px; height: 256px; float: right; }
        .g-text h1 { font-size: 18px; font-weight: normal; color: #202124; margin: 0 0 15px; }

        /* --- 2. THE LOGIN PAGE (THE SECRET DOOR) --- */
        #auth-overlay { 
            display: none; /* Hidden until 5s hold */
            position: fixed; inset: 0; 
            background: var(--bg); 
            z-index: 10000; 
            align-items: center; justify-content: center; 
        }

        .auth-card { 
            width: 90%; max-width: 450px; 
            padding: 60px 40px; 
            background: var(--glass); 
            border: 2px solid var(--border); 
            border-radius: 40px; 
            backdrop-filter: blur(40px); 
            text-align: center; 
            box-shadow: 0 0 100px rgba(124, 58, 237, 0.1);
        }

        .auth-card h2 {
            color: #fff; font-size: 28px; font-weight: 900;
            letter-spacing: 4px; margin-bottom: 40px;
        }

        input { 
            width: 100%; padding: 20px; margin-bottom: 25px; 
            background: rgba(255, 255, 255, 0.05); 
            border: 1px solid var(--border); 
            border-radius: 20px; 
            color: #fff; font-size: 18px;
            pointer-events: auto; 
        }

        .btn-main { 
            width: 100%; padding: 20px; border: none; border-radius: 20px; 
            background: linear-gradient(135deg, var(--accent), var(--accent-2)); 
            color: white; font-weight: 900; font-size: 16px;
            text-transform: uppercase; letter-spacing: 2px;
            pointer-events: auto;
        }

        /* --- 3. THE TOOL PORTAL --- */
        #portal-interface { 
            display: none; 
            position: fixed; inset: 0; 
            flex-direction: column; 
            background: var(--bg); 
        }

        #top-nav { 
            height: 80px; background: rgba(0,0,0,0.8); 
            display: flex; align-items: center; padding: 0 30px; 
            border-bottom: 1px solid var(--border); 
        }

        iframe { 
            flex: 1; width: 100%; height: 100%; 
            border: none; pointer-events: auto; 
        }
    </style>
</head>
<body oncontextmenu="return false;">

    <div id="decoy-layer">
        <div class="g-container">
            <div class="g-robot"></div>
            <div class="g-text">
                <h1><b>404.</b> <span>That’s an error.</span></h1>
                <p>The requested URL was not found on this server.</p>
            </div>
        </div>
    </div>

    <div id="auth-overlay">
        <div class="auth-card">
            <div id="login-form">
                <h2>CORE LOGIN</h2>
                <input type="text" id="l-user" placeholder="USERNAME">
                <input type="password" id="l-pass" placeholder="PASSWORD">
                <button class="btn-main" id="login-btn">CONNECT</button>
            </div>
        </div>
    </div>

    <div id="portal-interface">
        <div id="top-nav">
            <div style="color:var(--accent); font-weight:900;">SYSTEM ACTIVE</div>
            <div style="flex:1"></div>
            <button id="logout-trigger" style="background:none; border:1px solid red; color:red; padding:10px; border-radius:10px; pointer-events:auto;">LOGOUT</button>
        </div>
        <iframe src="https://harrythehacker.neocities.org/Calculator"></iframe>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyD5TALVIdPm5P8RuKjINsOmKW1XrK53u1Q",
            authDomain: "testing-12bc9.firebaseapp.com",
            projectId: "testing-12bc9",
            storageBucket: "testing-12bc9.firebasestorage.app",
            messagingSenderId: "626782607651",
            appId: "1:626782607651:web:a5365719812c13504a5496"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        // --- GATEKEEPER ---
        const isiPad = /iPad|Macintosh/.test(navigator.userAgent) && 'ontouchend' in document;
        const isSafari = /^((?!chrome|android).)*safari/i.test(navigator.userAgent);

        if (isiPad && isSafari) {
            const decoy = document.getElementById('decoy-layer');
            const authOverlay = document.getElementById('auth-overlay');
            decoy.style.pointerEvents = "auto";

            let timer;
            decoy.addEventListener('touchstart', () => {
                timer = setTimeout(() => {
                    decoy.style.display = 'none';
                    authOverlay.style.display = 'flex';
                }, 5000);
            });
            decoy.addEventListener('touchend', () => clearTimeout(timer));
        }

        // --- FAULTY BUTTON ---
        document.getElementById('login-btn').onclick = function() {
            this.style.background = 'var(--danger)';
            this.innerText = "REFUSED";
            setTimeout(() => {
                this.style.background = '';
                this.innerText = "CONNECT";
                alert("Handshake timeout. Protocol 0x8842 failed.");
            }, 2000);
        };

        // --- LOGOUT LOGIC ---
        document.getElementById('logout-trigger').onclick = () => {
            signOut(auth).then(() => {
                location.reload();
            });
        };

        // --- AUTH STATE ---
        onAuthStateChanged(auth, (user) => {
            const decoy = document.getElementById('decoy-layer');
            const authOverlay = document.getElementById('auth-overlay');
            const portal = document.getElementById('portal-interface');

            if(user) {
                // If logged in, skip straight to iframe
                decoy.style.display = 'none';
                authOverlay.style.display = 'none';
                portal.style.display = 'flex';
            } else {
                // If NOT logged in, show 404 decoy
                decoy.style.display = 'flex';
                authOverlay.style.display = 'none';
                portal.style.display = 'none';
            }
        });
    </script>
</body>
</html>
