<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 Not Found</title>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <style>
        :root {
            --bg: #0b0b18; --accent: #7c3aed; --accent-2: #4f46e5;
            --muted: #8078a8; --glass: rgba(255, 255, 255, 0.03);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: #fff; overflow: hidden; }
        
        /* DECOY */
        #decoy { position: fixed; inset: 0; background: #fff; display: flex; align-items: center; justify-content: center; z-index: 9999; font-size: 20px; color: #333; }

        /* AUTH */
        #auth-overlay { display: none; position: fixed; inset: 0; background: var(--bg); z-index: 10000; align-items: center; justify-content: center; }
        .card { width: 400px; padding: 40px; background: var(--glass); border: 1px solid rgba(255,255,255,0.1); border-radius: 24px; backdrop-filter: blur(20px); text-align: center; color: #fff; }
        input, textarea { width: 100%; padding: 12px; margin-bottom: 15px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; color: #fff; outline: none; }
        .btn { width: 100%; padding: 14px; border: none; border-radius: 12px; background: linear-gradient(135deg, var(--accent), var(--accent-2)); color: white; font-weight: 700; cursor: pointer; }

        /* PORTAL */
        #portal { display: none; position: fixed; inset: 0; flex-direction: column; background: var(--bg); z-index: 998; }
        #nav { height: 60px; background: rgba(0,0,0,0.4); display: flex; align-items: center; padding: 0 20px; gap: 15px; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .nav-item { color: var(--muted); cursor: pointer; font-size: 14px; font-weight: 600; padding: 8px 15px; border-radius: 8px; transition: 0.2s; }
        .nav-item.active { background: rgba(124,58,237,0.1); color: var(--accent); }

        /* CHAT */
        #chat-view { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
        #chat-box { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 12px; }
        .msg { padding: 12px; border-radius: 15px; background: rgba(255,255,255,0.05); color: #fff; max-width: 75%; align-self: flex-start; border: 1px solid rgba(255,255,255,0.05); }
        .msg.me { align-self: flex-end; background: rgba(124,58,237,0.15); border-color: var(--accent); }
        .msg-info { font-size: 10px; color: var(--accent); margin-bottom: 4px; font-weight: 800; display: flex; justify-content: space-between; }
        
        .view { display: none; width: 100%; height: 100%; }
        .view.active { display: flex; flex-direction: column; }
        iframe { flex: 1; border: none; }

        .admin-log { background: #000; padding: 10px; border-radius: 8px; font-family: monospace; font-size: 12px; color: #0f0; margin-bottom: 10px; border: 1px solid #333; }
    </style>
</head>
<body>

    <div id="decoy">404 Not Found</div>

    <div id="auth-overlay">
        <div class="card">
            <div id="login-form">
                <h2 style="margin-bottom:20px;">M-TOOL Entry</h2>
                <input type="email" id="email" placeholder="System Email">
                <input type="password" id="pass" placeholder="Security Key">
                <button class="btn" id="login-btn">Initialize</button>
                <p style="font-size:12px; margin-top:15px; cursor:pointer; color:var(--muted);" onclick="toggleMode(true)">Request Access</p>
            </div>
            <div id="req-form" style="display:none;">
                <h2 style="margin-bottom:20px;">Access Request</h2>
                <input type="text" id="r-user" placeholder="Desired Username">
                <input type="email" id="r-email" placeholder="Your Email">
                <input type="password" id="r-pass" placeholder="Desired Password">
                <button class="btn" id="req-btn">Submit Request</button>
                <p style="font-size:12px; margin-top:15px; cursor:pointer; color:var(--muted);" onclick="toggleMode(false)">Back to Login</p>
            </div>
        </div>
    </div>

    <div id="portal">
        <div id="nav">
            <span style="color:var(--accent); font-weight:900; letter-spacing:1px;">M-TOOL</span>
            <div class="nav-item active" onclick="tab('home', this)">Home</div>
            <div class="nav-item" onclick="tab('chat', this)">Chat</div>
            <div class="nav-item" onclick="tab('games', this)">Games</div>
            <div id="adm-nav" class="nav-item" style="display:none; color:gold;" onclick="tab('admin', this)">Admin</div>
            <div style="flex:1"></div>
            <div id="user-display" style="color:var(--muted); font-size:12px; font-weight:700;">GUEST</div>
            <div class="nav-item" style="color:#ff4b4b;" id="out-btn">Exit</div>
        </div>

        <div id="v-home" class="view active"><iframe id="f-home"></iframe></div>
        
        <div id="v-chat" class="view">
            <div id="chat-box"></div>
            <div style="padding:20px; background:rgba(0,0,0,0.3); display:flex; gap:10px;">
                <input type="text" id="chat-in" placeholder="Type a message or /command..." style="margin:0;">
                <button class="btn" style="width:100px;" id="send-btn">Send</button>
            </div>
        </div>

        <div id="v-games" class="view"><iframe id="f-games"></iframe></div>

        <div id="v-admin" class="view" style="padding:30px; color:#fff; overflow-y:auto;">
            <h2>Admin Command Center</h2><br>
            <div class="admin-log" id="admin-stats">Checking active nodes...</div>
            <div id="online-list"></div>
            <br>
            <h3>Global System Commands</h3>
            <div style="display:flex; gap:10px; margin-top:10px;">
                <button class="btn" style="width:auto; background:#ef4444;" onclick="adminAction('purge')">Purge Chat</button>
                <button class="btn" style="width:auto; background:#4b5563;" onclick="adminAction('alert')">Broadcast Alert</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, doc, getDoc, setDoc, deleteDoc, query, where, onSnapshot, serverTimestamp, orderBy, limit, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyD5TALVIdPm5P8RuKjINsOmKW1XrK53u1Q",
            authDomain: "testing-12bc9.firebaseapp.com",
            projectId: "testing-12bc9",
            storageBucket: "testing-12bc9.firebasestorage.app",
            messagingSenderId: "626782607651",
            appId: "1:626782607651:web:c5980863cef82d904a5496"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const ADM = "hjass2865@gmail.com";

        emailjs.init("6iGADKihYbPC4ecb_");

        // --- COMMAND LOGIC ---
        const handleCommand = async (input) => {
            const args = input.split(' ');
            const cmd = args[0].toLowerCase();
            const isAdmin = auth.currentUser.email === ADM;

            if (cmd === '/clear' && isAdmin) {
                const q = await getDocs(collection(db, "messages"));
                q.forEach(async (m) => await deleteDoc(doc(db, "messages", m.id)));
                return true;
            }
            if (cmd === '/alert' && isAdmin) {
                alert("GLOBAL ADMIN ALERT: " + args.slice(1).join(' '));
                return true;
            }
            return false;
        };

        // --- CHAT SYSTEM ---
        const startChat = () => {
            const q = query(collection(db, "messages"), orderBy("timestamp", "asc"), limit(60));
            onSnapshot(q, (snap) => {
                const box = document.getElementById('chat-box');
                box.innerHTML = "";
                snap.forEach(d => {
                    const m = d.data();
                    const isMe = auth.currentUser && m.uid === auth.currentUser.uid;
                    const div = document.createElement('div');
                    div.className = `msg ${isMe ? 'me' : ''}`;
                    div.innerHTML = `
                        <div class="msg-info">
                            <span>${m.user}</span>
                            ${auth.currentUser.email === ADM ? `<span style="cursor:pointer;color:red" onclick="window.del('${d.id}')">✕</span>` : ''}
                        </div>
                        ${m.text}
                    `;
                    box.appendChild(div);
                });
                box.scrollTop = box.scrollHeight;
            }, (err) => { console.error("Chat Failed. Ensure Index is created!", err); });
        };

        window.del = async (id) => { if(auth.currentUser.email === ADM) await deleteDoc(doc(db, "messages", id)); };

        document.getElementById('send-btn').onclick = async () => {
            const val = document.getElementById('chat-in').value;
            if(!val) return;
            if(val.startsWith('/')) {
                const executed = await handleCommand(val);
                if(executed) { document.getElementById('chat-in').value = ""; return; }
            }
            await addDoc(collection(db, "messages"), {
                text: val, user: auth.currentUser.email.split('@')[0], uid: auth.currentUser.uid, timestamp: serverTimestamp()
            });
            document.getElementById('chat-in').value = "";
        };

        // --- AUTH ---
        document.getElementById('login-btn').onclick = async () => {
            const e = document.getElementById('email').value;
            try {
                const res = await signInWithEmailAndPassword(auth, e, document.getElementById('pass').value);
                document.getElementById('auth-overlay').style.display = 'none';
                document.getElementById('portal').style.display = 'flex';
                document.getElementById('f-home').src = "https://calcsolver.github.io/Beairgubvgiagnvprngdb-rkagdfxbak-gdinbrsgdbuitkud/";
                document.getElementById('user-display').innerText = e.split('@')[0].toUpperCase();
                
                startChat();
                if(e === ADM) {
                    document.getElementById('adm-nav').style.display = 'block';
                    onSnapshot(query(collection(db, "active_sessions"), where("isOnline", "==", true)), (s) => {
                        const list = document.getElementById('online-list');
                        list.innerHTML = "";
                        s.forEach(u => list.innerHTML += `<div class="admin-log">🟢 ${u.data().username} - Online</div>`);
                    });
                }
                await setDoc(doc(db, "active_sessions", res.user.uid), { isOnline: true, username: e.split('@')[0] }, { merge: true });
            } catch { alert("Invalid Credentials"); }
        };

        document.getElementById('out-btn').onclick = async () => {
            await setDoc(doc(db, "active_sessions", auth.currentUser.uid), { isOnline: false }, { merge: true });
            await signOut(auth); location.reload();
        };

        document.getElementById('req-btn').onclick = async () => {
            const last = localStorage.getItem('last_r');
            if(last && Date.now() - last < 60000) return alert("Anti-Spam active. Wait 60s.");
            const u = document.getElementById('r-user').value;
            const e = document.getElementById('r-email').value;
            const p = document.getElementById('r-pass').value;
            await addDoc(collection(db, "requests"), { u, e, p, time: serverTimestamp() });
            emailjs.send("service_06y4hgi", "template_56l2irz", { username: u, user_email: e, user_pass: p });
            localStorage.setItem('last_r', Date.now());
            alert("Request sent to Admin.");
        };
    </script>

    <script>
        document.onkeydown = (e) => { if(e.ctrlKey && e.key === 'x') { document.getElementById('decoy').style.display = 'none'; document.getElementById('auth-overlay').style.display = 'flex'; } };
        function toggleMode(req) { document.getElementById('login-form').style.display = req ? 'none' : 'block'; document.getElementById('req-form').style.display = req ? 'block' : 'none'; }
        function tab(id, btn) {
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById('v-' + id).classList.add('active');
            btn.classList.add('active');
            if(id === 'games') document.getElementById('f-games').src = "https://calcsolver.github.io/";
        }
        window.adminAction = (type) => { alert("Execute " + type + " from chat using /clear or /alert [msg]"); }
    </script>
</body>
</html>
