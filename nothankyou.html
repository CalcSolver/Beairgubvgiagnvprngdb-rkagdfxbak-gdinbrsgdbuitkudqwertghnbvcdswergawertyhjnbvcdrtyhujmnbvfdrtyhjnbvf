<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>404 Not Found</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <script>emailjs.init("6iGADKihYbPC4ecb_");</script>

    <style>
        :root { 
            --bg: #0a0a0f; --accent: #7c3aed; --danger: #ef4444; 
            --glass: rgba(255, 255, 255, 0.05); --border: rgba(255, 255, 255, 0.1); 
        }

        /* DISABLE MOUSE & SELECTION */
        * { 
            margin: 0; padding: 0; box-sizing: border-box; 
            cursor: none !important; user-select: none; 
            -webkit-user-select: none; -webkit-touch-callout: none; 
        }

        body { background: #fff; height: 100vh; overflow: hidden; font-family: sans-serif; touch-action: none; }

        /* DECOY LAYER */
        #decoy { 
            position: fixed; inset: 0; background: #fff; z-index: 100; 
            display: flex; align-items: center; justify-content: center; 
            pointer-events: auto; /* Ensure we can touch this */
        }
        .g-robot { background: url('https://www.google.com/images/errors/robot.png'); width: 256px; height: 256px; float: right; }

        /* AUTH LAYER */
        #auth { 
            display: none; position: fixed; inset: 0; background: var(--bg); 
            z-index: 200; align-items: center; justify-content: center; 
        }
        .card { 
            width: 90%; max-width: 400px; padding: 40px; 
            background: var(--glass); border: 1px solid var(--border); 
            border-radius: 30px; backdrop-filter: blur(20px); text-align: center; color: #fff;
        }

        input { 
            width: 100%; padding: 15px; margin-bottom: 15px; 
            background: rgba(255,255,255,0.05); border: 1px solid var(--border); 
            border-radius: 12px; color: #fff; pointer-events: auto;
        }

        .btn { 
            width: 100%; padding: 15px; border: none; border-radius: 12px; 
            background: var(--accent); color: #fff; font-weight: bold; 
            pointer-events: auto; margin-top: 10px;
        }

        /* PORTAL LAYER */
        #portal { display: none; position: fixed; inset: 0; z-index: 300; background: #000; flex-direction: column; }
        iframe { flex: 1; border: none; pointer-events: auto; }
    </style>
</head>
<body oncontextmenu="return false;">

    <div id="decoy">
        <div style="max-width: 600px; padding: 20px;">
            <div class="g-robot"></div>
            <div style="font-size: 18px; color: #222;">
                <b>404.</b> <span style="color:#777">That’s an error.</span><br><br>
                <p>The requested URL was not found on this server.</p>
            </div>
        </div>
    </div>

    <div id="auth">
        <div class="card" id="login-box">
            <h2 style="margin-bottom:20px;">SYSTEM ACCESS</h2>
            <input type="text" id="user" placeholder="NICKNAME">
            <input type="password" id="pass" placeholder="PASSWORD">
            <button class="btn" id="login-btn">CONNECT</button>
            <p onclick="showBox('reg')" style="margin-top:20px; font-size:12px; color:var(--accent); pointer-events:auto;">Request Access</p>
        </div>

        <div class="card" id="reg-box" style="display:none;">
            <h2 style="margin-bottom:20px;">REQUEST ACCOUNT</h2>
            <input type="text" id="r-user" placeholder="NICKNAME">
            <input type="email" id="r-email" placeholder="EMAIL">
            <input type="password" id="r-pass" placeholder="PASSWORD">
            <button class="btn" id="req-btn">SEND REQUEST</button>
            <p onclick="showBox('login')" style="margin-top:20px; font-size:12px; color:#888; pointer-events:auto;">Back</p>
        </div>
    </div>

    <div id="portal">
        <div style="height:50px; padding:10px; text-align:right;">
            <button onclick="location.reload()" style="color:red; background:none; border:none; pointer-events:auto;">LOGOUT</button>
        </div>
        <iframe src="https://harrythehacker.neocities.org/Calculator"></iframe>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyD5TALVIdPm5P8RuKjINsOmKW1XrK53u1Q",
            authDomain: "testing-12bc9.firebaseapp.com",
            projectId: "testing-12bc9"
        };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // --- IPAD SAFARI GATE ---
        const isiPad = /iPad|Macintosh/.test(navigator.userAgent) && 'ontouchend' in document;
        const isSafari = /^((?!chrome|android).)*safari/i.test(navigator.userAgent);

        if (isiPad && isSafari) {
            let timer;
            const decoy = document.getElementById('decoy');
            
            decoy.addEventListener('touchstart', () => {
                timer = setTimeout(() => {
                    decoy.style.display = 'none';
                    document.getElementById('auth').style.display = 'flex';
                }, 5000);
            });
            decoy.addEventListener('touchend', () => clearTimeout(timer));
        }

        // --- UI SWITCHER ---
        window.showBox = (mode) => {
            document.getElementById('login-box').style.display = mode === 'reg' ? 'none' : 'block';
            document.getElementById('reg-box').style.display = mode === 'reg' ? 'block' : 'none';
        };

        // --- SUBMIT REQUEST ---
        document.getElementById('req-btn').onclick = async () => {
            const u = document.getElementById('r-user').value;
            const e = document.getElementById('r-email').value;
            const p = document.getElementById('r-pass').value;
            if(!u || !e || !p) return alert("Fill all fields");

            try {
                await addDoc(collection(db, "requests"), { nickname: u, email: e, password: p, time: serverTimestamp() });
                await emailjs.send("service_06y4hgi", "template_56l2irz", { from_name: u, user_email: e, user_pass: p });
                alert("Request Sent");
                showBox('login');
            } catch(err) { alert("Error"); }
        };

        // --- LOGIN ---
        document.getElementById('login-btn').onclick = function() {
            const val = document.getElementById('user').value.toUpperCase();
            if(val === "ADMIN") {
                document.getElementById('auth').style.display = 'none';
                document.getElementById('portal').style.display = 'flex';
            } else {
                this.style.background = 'red';
                this.innerText = "REFUSED";
                setTimeout(() => {
                    this.style.background = '';
                    this.innerText = "CONNECT";
                    alert("System Error: Handshake timeout. Protocol 0x8842 failed.");
                }, 1000);
            }
        };
    </script>
</body>
</html>
