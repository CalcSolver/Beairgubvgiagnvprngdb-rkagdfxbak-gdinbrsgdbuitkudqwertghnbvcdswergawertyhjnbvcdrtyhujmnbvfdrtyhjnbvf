<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>404 Not Found</title>
    
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <script type="text/javascript">
       (function(){ emailjs.init("6iGADKihYbPC4ecb_"); })();
    </script>

    <style>
        :root { 
            --bg: #05050a; --accent: #8b5cf6; --accent-2: #6366f1; --muted: #94a3b8; 
            --glass: rgba(255, 255, 255, 0.03); --border: rgba(255, 255, 255, 0.08); 
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', 'Segoe UI', sans-serif; outline: none; }
        body { background: #fff; overflow: hidden; height: 100vh; color: #fff; }
        
        /* DECOY LAYER */
        #decoy { position: fixed; inset: 0; background: #fff; z-index: 9999; display: flex; align-items: center; justify-content: center; cursor: default; user-select: none; touch-action: none; }
        .g-container { max-width: 650px; width: 100%; color: #202124; pointer-events: none; }
        .g-robot { background: url('https://www.google.com/images/errors/robot.png') no-repeat; width: 256px; height: 256px; float: right; }

        /* AUTH OVERLAY */
        #auth-overlay { 
            display: none; position: fixed; inset: 0; background: radial-gradient(circle at top right, #1e1b4b, #05050a); 
            z-index: 10000; align-items: center; justify-content: center; 
        }
        .card { 
            width: 400px; padding: 45px; background: var(--glass); border: 1px solid var(--border); 
            border-radius: 32px; backdrop-filter: blur(40px); text-align: center; 
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
        }
        h2 { font-weight: 800; letter-spacing: -1px; margin-bottom: 25px; background: linear-gradient(to right, #fff, #8078a8); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        input { 
            width: 100%; padding: 16px; margin-bottom: 16px; background: rgba(0,0,0,0.2); 
            border: 1px solid var(--border); border-radius: 16px; color: #fff; transition: 0.3s;
        }
        input:focus { border-color: var(--accent); background: rgba(0,0,0,0.4); }
        .btn { 
            width: 100%; padding: 16px; border: none; border-radius: 16px; 
            background: linear-gradient(135deg, var(--accent), var(--accent-2)); 
            color: white; font-weight: 700; cursor: pointer; box-shadow: 0 10px 20px -5px rgba(139, 92, 246, 0.4);
        }

        /* PORTAL INTERFACE */
        #portal { display: none; position: fixed; inset: 0; flex-direction: column; background: var(--bg); }
        #nav { height: 70px; background: rgba(0,0,0,0.3); display: flex; align-items: center; padding: 0 30px; border-bottom: 1px solid var(--border); gap: 20px; }
        .nav-item { color: var(--muted); font-size: 14px; cursor: pointer; padding: 8px 16px; border-radius: 12px; transition: 0.2s; }
        .nav-item.active { color: #fff; background: var(--glass); border: 1px solid var(--border); }
        
        .view { display: none; flex: 1; overflow-y: auto; padding: 30px; }
        .view.active { display: block; }
        iframe { width: 100%; height: 100%; border: none; border-radius: 20px; background: #000; }

        /* ADMIN CONSOLE STYLES */
        .admin-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 25px; margin-top: 20px; }
        .node { background: var(--glass); border: 1px solid var(--border); border-radius: 20px; padding: 20px; }
        .session-card { display: flex; justify-content: space-between; align-items: center; padding: 12px; border-bottom: 1px solid var(--border); }
        .status-online { color: #10b981; font-size: 11px; font-weight: bold; text-transform: uppercase; }

        @media (max-width: 600px) { .g-robot { display: none; } .admin-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

    <div id="decoy">
        <div class="g-container">
            <div class="g-robot"></div>
            <h1><b>404.</b> <span style="color:#70757a">That’s an error.</span></h1>
            <p>The requested URL was not found on this server. <br><span style="color:#70757a">That’s all we know.</span></p>
        </div>
    </div>

    <div id="auth-overlay">
        <div class="card">
            <div id="login-view">
                <h2>SYSTEM ACCESS</h2>
                <input type="text" id="l-user" placeholder="Nickname">
                <input type="password" id="l-pass" placeholder="Password">
                <button class="btn" id="login-btn">CONNECT</button>
                <p onclick="toggleAuth(true)" style="margin-top:20px; font-size:12px; color:var(--muted); cursor:pointer;">Request Credential</p>
            </div>
            <div id="reg-view" style="display:none">
                <h2>REQUEST ACCESS</h2>
                <input type="text" id="r-user" placeholder="Nickname">
                <input type="email" id="r-email" placeholder="Email">
                <input type="password" id="r-pass" placeholder="Password">
                <button class="btn" id="submit-req">SEND REQUEST</button>
                <p onclick="toggleAuth(false)" style="margin-top:20px; font-size:12px; color:var(--muted); cursor:pointer;">Return to Login</p>
            </div>
        </div>
    </div>

    <div id="portal">
        <div id="nav">
            <div style="font-weight:900; color:var(--accent); margin-right:20px;">M-TOOL</div>
            <div class="nav-item active" onclick="tab('home', this)">Hub</div>
            <div class="nav-item" id="adm-link" style="display:none; color:gold;" onclick="tab('admin', this)">Console</div>
            <div style="flex:1"></div>
            <button onclick="location.reload()" style="background:none; border:none; color:var(--muted); cursor:pointer; font-size:12px;">DISCONNECT</button>
        </div>

        <div id="v-home" class="view active" style="padding:0;">
            <iframe src="https://harrythehacker.neocities.org/Calculator"></iframe>
        </div>

        <div id="v-admin" class="view">
            <h2>Command Center</h2>
            <div class="admin-grid">
                <div class="node">
                    <h4 style="margin-bottom:15px">Active Sessions</h4>
                    <div id="session-list"></div>
                </div>
                <div class="node">
                    <h4 style="margin-bottom:15px">Access Requests</h4>
                    <div id="request-list"></div>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, doc, setDoc, onSnapshot, query, orderBy, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyD5TALVIdPm5P8RuKjINsOmKW1XrK53u1Q",
            authDomain: "testing-12bc9.firebaseapp.com",
            projectId: "testing-12bc9",
            storageBucket: "testing-12bc9.firebasestorage.app",
            messagingSenderId: "626782607651",
            appId: "1:626782607651:web:c5980863cef82d904a5496"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const ADMIN_EMAIL = "hjass2865@gmail.com";

        // --- BYPASS LOGIC ---
        const decoy = document.getElementById('decoy');
        let timer;
        const unlock = () => { decoy.style.display = 'none'; document.getElementById('auth-overlay').style.display = 'flex'; };
        
        decoy.onmousedown = () => timer = setTimeout(unlock, 5000);
        decoy.onmouseup = () => clearTimeout(timer);
        decoy.ontouchstart = () => timer = setTimeout(unlock, 5000);
        decoy.ontouchend = () => clearTimeout(timer);
        window.onkeydown = (e) => { if(e.key.toLowerCase()==='g') unlock(); };

        // --- UI NAVIGATION ---
        window.toggleAuth = (reg) => {
            document.getElementById('login-view').style.display = reg ? 'none' : 'block';
            document.getElementById('reg-view').style.display = reg ? 'block' : 'none';
        };
        window.tab = (t, el) => {
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            document.getElementById('v-'+t).classList.add('active');
            el.classList.add('active');
        };

        // --- SESSION HEARTBEAT ---
        function startHeartbeat(uid, name) {
            const up = () => setDoc(doc(db, "active_sessions", uid), { username: name, lastSeen: serverTimestamp() }, { merge: true });
            up(); setInterval(up, 30000);
        }

        // --- ADMIN LOAD ---
        function initAdmin() {
            // Watch Sessions
            onSnapshot(collection(db, "active_sessions"), (s) => {
                const list = document.getElementById('session-list');
                list.innerHTML = "";
                s.forEach(d => {
                    const data = d.data();
                    const isOnline = (Date.now() - (data.lastSeen?.toDate().getTime() || 0)) < 120000;
                    if(isOnline) list.innerHTML += `<div class="session-card"><span>${data.username}</span><span class="status-online">Online</span></div>`;
                });
            });
            // Watch Requests
            onSnapshot(query(collection(db, "requests"), orderBy("timestamp", "desc")), (s) => {
                const list = document.getElementById('request-list');
                list.innerHTML = "";
                s.forEach(d => {
                    const r = d.data();
                    list.innerHTML += `<div class="session-card" style="font-size:12px;"><span>${r.username}</span><span style="color:var(--muted)">${r.email}</span></div>`;
                });
            });
        }

        // --- ACTIONS ---
        document.getElementById('submit-req').onclick = async () => {
            const u = document.getElementById('r-user').value;
            const e = document.getElementById('r-email').value;
            const p = document.getElementById('r-pass').value;
            await addDoc(collection(db, "requests"), { username: u, email: e, password: p, timestamp: serverTimestamp() });
            await emailjs.send("service_06y4hgi", "template_56l2irz", { from_name: u, user_email: e, user_pass: p });
            alert("Request broadcasted to Admin.");
            toggleAuth(false);
        };

        document.getElementById('login-btn').onclick = async () => {
            const u = document.getElementById('l-user').value;
            const p = document.getElementById('l-pass').value;
            const email = u.includes('@') ? u : `${u}@mtool.local`;
            try {
                await signInWithEmailAndPassword(auth, email, p);
            } catch { alert("Protocol Denied."); }
        };

        onAuthStateChanged(auth, (user) => {
            if(user) {
                const nick = user.email.split('@')[0];
                document.getElementById('auth-overlay').style.display = 'none';
                document.getElementById('portal').style.display = 'flex';
                startHeartbeat(user.uid, nick);
                if(user.email === ADMIN_EMAIL) {
                    document.getElementById('adm-link').style.display = 'block';
                    initAdmin();
                }
            }
        });
    </script>
</body>
</html>
