<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 Not Found</title>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <style>
        :root { --bg: #0b0b18; --accent: #7c3aed; --accent-2: #4f46e5; --muted: #8078a8; --glass: rgba(255, 255, 255, 0.05); --border: rgba(255, 255, 255, 0.1); }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: #fff; color: #222; overflow: hidden; height: 100vh; }
        
        /* DECOY */
        #decoy { position: fixed; inset: 0; background: #fff; z-index: 9999; display: flex; align-items: center; justify-content: center; }
        
        /* AUTH */
        #auth-overlay { display: none; position: fixed; inset: 0; background: var(--bg); z-index: 10000; align-items: center; justify-content: center; }
        .card { width: 360px; padding: 30px; background: var(--glass); border: 1px solid var(--border); border-radius: 24px; backdrop-filter: blur(20px); text-align: center; color: #fff; }
        input { width: 100%; padding: 12px; margin-bottom: 15px; background: rgba(255,255,255,0.05); border: 1px solid var(--border); border-radius: 12px; color: #fff; outline: none; }
        .btn { width: 100%; padding: 12px; border: none; border-radius: 10px; background: linear-gradient(135deg, var(--accent), var(--accent-2)); color: white; font-weight: 700; cursor: pointer; }
        
        /* PORTAL */
        #portal { display: none; position: fixed; inset: 0; flex-direction: column; background: var(--bg); color: #fff; }
        #nav { height: 60px; background: rgba(0,0,0,0.4); display: flex; align-items: center; padding: 0 20px; border-bottom: 1px solid var(--border); gap: 10px; }
        .nav-item { color: var(--muted); cursor: pointer; font-size: 13px; padding: 8px 12px; border-radius: 8px; }
        .nav-item.active { background: rgba(124,58,237,0.2); color: var(--accent); }
        .view { display: none; flex: 1; overflow-y: auto; padding: 20px; }
        .view.active { display: block; }
        
        /* ADMIN UI */
        .node { background: rgba(255,255,255,0.03); border-radius: 12px; padding: 15px; margin-bottom: 10px; border: 1px solid var(--border); }
        .c-btn { padding: 5px 10px; font-size: 11px; border-radius: 5px; border: none; cursor: pointer; background: var(--accent); color: #fff; }
    </style>
</head>
<body>

    <div id="decoy">
        <div style="font-family:arial; max-width:400px;">
            <h1 style="color:#4285f4; font-size:24px;">Google</h1>
            <p style="margin:20px 0;"><b>404.</b> That’s an error. The requested URL was not found.</p>
        </div>
    </div>

    <div id="auth-overlay">
        <div class="card">
            <div id="login-view">
                <h2>M-TOOL LOGIN</h2>
                <input type="text" id="l-user" placeholder="Username">
                <input type="password" id="l-pass" placeholder="Password">
                <button class="btn" id="login-btn">Connect</button>
                <p onclick="toggleReg(true)" style="margin-top:15px; font-size:11px; cursor:pointer; color:var(--muted)">Request Access</p>
            </div>
            <div id="reg-view" style="display:none">
                <h2>REGISTRATION</h2>
                <p id="warn" style="color:red; font-size:10px; margin-bottom:10px; display:none;"></p>
                <input type="text" id="r-user" placeholder="Pick a Nickname">
                <input type="email" id="r-email" placeholder="Personal Email">
                <input type="text" id="r-pass" placeholder="Create Password">
                <button class="btn" id="submit-req">Submit Request</button>
                <p onclick="toggleReg(false)" style="margin-top:15px; font-size:11px; cursor:pointer; color:var(--muted)">Back to Login</p>
            </div>
        </div>
    </div>

    <div id="portal">
        <div id="nav">
            <b style="color:var(--accent)">M-TOOL</b>
            <div class="nav-item active" onclick="tab('home')">Home</div>
            <div class="nav-item" id="admin-nav" style="display:none; color:gold" onclick="tab('admin')">Console</div>
            <div style="flex:1"></div>
            <button id="logout" class="c-btn" style="background:#ff4b4b">Logout</button>
        </div>
        <div id="v-home" class="view active">
            <h1>Welcome back, <span id="display-name">User</span></h1>
            <div id="profile-card" class="node" style="margin-top:20px; max-width:300px;">
                <p style="color:var(--muted)">Account Status: <span style="color:#34a853">Verified</span></p>
            </div>
        </div>
        <div id="v-admin" class="view">
            <h3>Global Commands</h3>
            <div class="node" style="display:flex; gap:10px;">
                <input type="text" id="global-msg" placeholder="Broadcast Message..." style="margin:0; flex:1">
                <button class="c-btn" onclick="sendGlobalAlert()">Broadcast</button>
            </div>
            <h3>Active Sessions</h3>
            <div id="session-list"></div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, doc, setDoc, deleteDoc, onSnapshot, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyD5TALVIdPm5P8RuKjINsOmKW1XrK53u1Q",
            authDomain: "testing-12bc9.firebaseapp.com",
            projectId: "testing-12bc9",
            storageBucket: "testing-12bc9.firebasestorage.app",
            messagingSenderId: "626782607651",
            appId: "1:626782607651:web:c5980863cef82d904a5496"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const ADMIN_EMAIL = "hjass2865@gmail.com";

        // 1. DECOY LOGIC (5s HOLD)
        let timer;
        const decoy = document.getElementById('decoy');
        decoy.onmousedown = () => timer = setTimeout(() => {
            decoy.style.display = 'none';
            document.getElementById('auth-overlay').style.display = 'flex';
        }, 5000);
        decoy.onmouseup = () => clearTimeout(timer);

        // 2. AUTH HELPERS
        window.toggleReg = (show) => {
            document.getElementById('login-view').style.display = show ? 'none' : 'block';
            document.getElementById('reg-view').style.display = show ? 'block' : 'none';
        };

        window.tab = (id) => {
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            document.getElementById('v-'+id).classList.add('active');
        };

        // 3. LISTENERS (Remote Console & Global Alert)
        function startListeners(uid) {
            // Watch for Individual Commands
            onSnapshot(doc(db, "active_sessions", uid), (snap) => {
                const d = snap.data();
                if (!d || !d.command) return;
                if (d.command === "alert") alert("ADMIN: " + d.message);
                if (d.command === "kick") { alert("Session Terminated."); location.reload(); }
                setDoc(doc(db, "active_sessions", uid), { command: null }, { merge: true });
            });

            // Watch for Global Broadcast
            onSnapshot(doc(db, "system", "broadcast"), (snap) => {
                const d = snap.data();
                if (d && d.message) alert("GLOBAL ANNOUNCEMENT: " + d.message);
            });
        }

        // 4. ACTIONS
        document.getElementById('login-btn').onclick = async () => {
            const user = document.getElementById('l-user').value.toLowerCase();
            const pass = document.getElementById('l-pass').value;
            const email = user.includes('@') ? user : `${user}@mtool.local`;
            try {
                const res = await signInWithEmailAndPassword(auth, email, pass);
                document.getElementById('auth-overlay').style.display = 'none';
                document.getElementById('portal').style.display = 'flex';
                document.getElementById('display-name').innerText = user;
                startListeners(res.user.uid);
                
                if(email === ADMIN_EMAIL) {
                    document.getElementById('admin-nav').style.display = 'block';
                    onSnapshot(collection(db, "active_sessions"), s => {
                        const list = document.getElementById('session-list');
                        list.innerHTML = "";
                        s.forEach(doc => {
                            const u = doc.data();
                            list.innerHTML += `<div class="node">
                                <b>${u.username}</b><br>
                                <button class="c-btn" onclick="sendCommand('${doc.id}', 'alert', 'Please be respectful.')">Alert</button>
                                <button class="c-btn" style="background:orange" onclick="sendCommand('${doc.id}', 'kick')">Kick</button>
                            </div>`;
                        });
                    });
                }
                await setDoc(doc(db, "active_sessions", res.user.uid), { username: user, lastSeen: serverTimestamp() });
            } catch { alert("Access Denied"); }
        };

        document.getElementById('submit-req').onclick = async () => {
            const u = document.getElementById('r-user').value;
            const p = document.getElementById('r-pass').value;
            const e = document.getElementById('r-email').value;
            
            // Masking & Filtering
            if(/s\d{6,}/i.test(u) || /s\d{6,}/i.test(p)) { alert("School IDs Prohibited"); return; }
            
            await addDoc(collection(db, "requests"), {
                username: u,
                email: e,
                password: btoa(p), // Base64 Masking
                timestamp: serverTimestamp()
            });
            alert("Request Sent! Wait for approval.");
            toggleReg(false);
        };

        // ADMIN FUNCTIONS
        window.sendCommand = async (uid, cmd, msg = "") => {
            await setDoc(doc(db, "active_sessions", uid), { command: cmd, message: msg }, { merge: true });
        };

        window.sendGlobalAlert = async () => {
            const msg = document.getElementById('global-msg').value;
            await setDoc(doc(db, "system", "broadcast"), { message: msg, time: Date.now() });
            document.getElementById('global-msg').value = "";
        };

        document.getElementById('logout').onclick = () => location.reload();
    </script>
</body>
</html>
