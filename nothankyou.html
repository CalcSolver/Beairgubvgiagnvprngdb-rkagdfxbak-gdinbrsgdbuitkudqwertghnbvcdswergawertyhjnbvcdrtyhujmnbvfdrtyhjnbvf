<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>404 Not Found</title>
    
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <script type="text/javascript">
       (function(){ emailjs.init("6iGADKihYbPC4ecb_"); })();
    </script>

    <style>
        :root { 
            --bg: #05050a; --accent: #8b5cf6; --accent-2: #6366f1; --muted: #94a3b8; 
            --glass: rgba(255, 255, 255, 0.03); --border: rgba(255, 255, 255, 0.08); 
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', 'Segoe UI', sans-serif; outline: none; }
        body { background: #fff; overflow: hidden; height: 100vh; color: #fff; }
        
        /* DECOY LAYER */
        #decoy { position: fixed; inset: 0; background: #fff; z-index: 9999; display: flex; align-items: center; justify-content: center; cursor: default; user-select: none; touch-action: none; }
        .g-container { max-width: 650px; width: 100%; color: #202124; pointer-events: none; }
        .g-robot { background: url('https://www.google.com/images/errors/robot.png') no-repeat; width: 256px; height: 256px; float: right; }

        /* AUTH OVERLAY (NATEBEV STYLE) */
        #auth-overlay { 
            display: none; position: fixed; inset: 0; 
            background: radial-gradient(circle at top right, #1e1b4b, #05050a); 
            z-index: 10000; align-items: center; justify-content: center; 
        }
        .card { 
            width: 400px; padding: 45px; background: var(--glass); border: 1px solid var(--border); 
            border-radius: 32px; backdrop-filter: blur(40px); text-align: center; 
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
            animation: fadeIn 0.6s ease-out;
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        h2 { font-weight: 800; letter-spacing: -1px; margin-bottom: 25px; font-size: 24px; background: linear-gradient(to right, #fff, #94a3b8); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        
        input { 
            width: 100%; padding: 16px; margin-bottom: 16px; background: rgba(0,0,0,0.2); 
            border: 1px solid var(--border); border-radius: 16px; color: #fff; transition: 0.3s;
            font-size: 14px;
        }
        input:focus { border-color: var(--accent); background: rgba(0,0,0,0.4); box-shadow: 0 0 0 4px rgba(139, 92, 246, 0.1); }
        
        .btn { 
            width: 100%; padding: 16px; border: none; border-radius: 16px; 
            background: linear-gradient(135deg, var(--accent), var(--accent-2)); 
            color: white; font-weight: 700; cursor: pointer; transition: 0.3s;
            box-shadow: 0 10px 20px -5px rgba(139, 92, 246, 0.4);
        }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 15px 25px -5px rgba(139, 92, 246, 0.5); }
        .btn:active { transform: translateY(0); }

        /* PORTAL INTERFACE */
        #portal { display: none; position: fixed; inset: 0; flex-direction: column; background: var(--bg); }
        #nav { height: 70px; background: rgba(0,0,0,0.3); display: flex; align-items: center; padding: 0 30px; border-bottom: 1px solid var(--border); }
        .nav-logo { font-weight: 900; color: var(--accent); font-size: 20px; letter-spacing: -1px; }
        
        iframe { flex: 1; border: none; width: 100%; height: 100%; }

        @media (max-width: 600px) { .g-robot { display: none; } .card { width: 90%; padding: 30px; } }
    </style>
</head>
<body>

    <div id="decoy">
        <div class="g-container">
            <div class="g-robot"></div>
            <h1><b>404.</b> <span style="color:#70757a">That’s an error.</span></h1>
            <p>The requested URL was not found on this server. <br><span style="color:#70757a">That’s all we know.</span></p>
        </div>
    </div>

    <div id="auth-overlay">
        <div class="card">
            <div id="login-view">
                <h2>SYSTEM ACCESS</h2>
                <input type="text" id="l-user" placeholder="Nickname">
                <input type="password" id="l-pass" placeholder="Password">
                <button class="btn" id="login-btn">CONNECT</button>
                <p onclick="toggleAuth(true)" style="margin-top:20px; font-size:12px; color:var(--muted); cursor:pointer;">Request New Credentials</p>
            </div>

            <div id="reg-view" style="display:none">
                <h2>REQUEST ACCESS</h2>
                <input type="text" id="r-user" placeholder="Nickname">
                <input type="email" id="r-email" placeholder="Email">
                <input type="password" id="r-pass" placeholder="Password">
                <button class="btn" id="submit-req">SUBMIT REQUEST</button>
                <p onclick="toggleAuth(false)" style="margin-top:20px; font-size:12px; color:var(--muted); cursor:pointer;">Return to Login</p>
            </div>
        </div>
    </div>

    <div id="portal">
        <div id="nav">
            <div class="nav-logo">M-TOOL</div>
            <div style="flex:1"></div>
            <button onclick="location.reload()" style="background:none; border:1px solid #ef4444; color:#ef4444; padding:8px 16px; border-radius:12px; cursor:pointer; font-size:12px; font-weight:600; transition:0.3s;">LOGOUT</button>
        </div>
        <iframe src="https://harrythehacker.neocities.org/Calculator"></iframe>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, doc, setDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyD5TALVIdPm5P8RuKjINsOmKW1XrK53u1Q",
            authDomain: "testing-12bc9.firebaseapp.com",
            projectId: "testing-12bc9",
            storageBucket: "testing-12bc9.firebasestorage.app",
            messagingSenderId: "626782607651",
            appId: "1:626782607651:web:c5980863cef82d904a5496"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // --- BYPASS LOGIC ---
        const decoy = document.getElementById('decoy');
        let timer;
        const unlock = () => { 
            decoy.style.display = 'none'; 
            document.getElementById('auth-overlay').style.display = 'flex'; 
        };

        decoy.onmousedown = () => timer = setTimeout(unlock, 5000);
        decoy.onmouseup = () => clearTimeout(timer);
        decoy.ontouchstart = () => timer = setTimeout(unlock, 5000);
        decoy.ontouchend = () => clearTimeout(timer);
        window.onkeydown = (e) => { if (e.key.toLowerCase() === 'g') unlock(); };

        // --- UI LOGIC ---
        window.toggleAuth = (isReg) => {
            document.getElementById('login-view').style.display = isReg ? 'none' : 'block';
            document.getElementById('reg-view').style.display = isReg ? 'block' : 'none';
        };

        // --- FIREBASE ACTIONS ---
        document.getElementById('submit-req').onclick = async () => {
            const nick = document.getElementById('r-user').value.trim();
            const email = document.getElementById('r-email').value.trim();
            const pass = document.getElementById('r-pass').value;
            if(!nick || !email || !pass) return alert("Fields cannot be empty");

            try {
                await addDoc(collection(db, "requests"), {
                    username: nick, email: email, password: pass, timestamp: serverTimestamp()
                });
                await emailjs.send("service_06y4hgi", "template_56l2irz", {
                    from_name: nick, user_email: email, user_pass: pass
                });
                alert("Request Sent!");
                toggleAuth(false);
            } catch (e) { alert("Error: " + e.message); }
        };

        document.getElementById('login-btn').onclick = async () => {
            const user = document.getElementById('l-user').value.trim();
            const pass = document.getElementById('l-pass').value;
            const email = user.includes('@') ? user : `${user}@mtool.local`;
            try {
                await signInWithEmailAndPassword(auth, email, pass);
            } catch (e) { alert("Protocol Denied."); }
        };

        onAuthStateChanged(auth, (user) => {
            if(user) {
                document.getElementById('auth-overlay').style.display = 'none';
                document.getElementById('portal').style.display = 'flex';
                // Update active session
                setDoc(doc(db, "active_sessions", user.uid), {
                    username: user.email.split('@')[0],
                    lastSeen: serverTimestamp()
                }, { merge: true });
            }
        });
    </script>
</body>
</html>
