<!DOCTYPE html>
<html>
<head>
<title>404 Not Found</title>
<link id="fav" rel="shortcut icon" type="image/png" href="https://www.google.com/favicon.ico">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#fff;font-family:sans-serif;color:#555;display:flex;align-items:center;justify-content:center;height:100vh;overflow:hidden}
.n{font-size:90px;font-weight:700;color:#e0e0e0}
p{font-size:14px;color:#999;margin-top:6px}
small{font-size:11px;color:#ccc;font-family:monospace;display:block;margin-top:20px}

/* Warning Modal */
#warning-modal{position:fixed;inset:0;z-index:10000;background:rgba(7,9,15,0.98);display:none;align-items:center;justify-content:center;padding:20px}
.w-card{background:#0d1117;border:1px solid #ff4757;padding:30px;border-radius:12px;max-width:500px;text-align:center;box-shadow:0 0 40px rgba(255,71,87,0.15)}
.w-card h2{color:#ff4757;margin-bottom:15px;font-size:22px}
.w-card p{color:#8899bb;line-height:1.6;margin-bottom:25px;font-size:14px}
.w-btns{display:flex;gap:10px}
.w-btn{flex:1;padding:12px;border-radius:8px;border:none;font-weight:700;cursor:pointer;transition:0.2s}
.w-ok{background:#00ff88;color:#000}
.w-ok:hover{background:#00d477}
.w-no{background:#253044;color:#fff}

#portal{display:none;position:fixed;inset:0;z-index:999;flex-direction:column;background:#07090f;color:#e8eef8;font-family:'Segoe UI',sans-serif}
#nav{height:50px;background:#0d1117;border-bottom:1px solid #1e2736;display:flex;align-items:center;padding:0 12px;gap:4px;flex-shrink:0}
.brand{font-family:monospace;font-size:13px;font-weight:700;color:#00d4ff;letter-spacing:2px;margin-right:6px}
.sep{width:1px;height:22px;background:#253044;margin:0 4px}
.sp{flex:1}
.nb{font-size:12px;font-weight:600;padding:0 11px;height:30px;border-radius:6px;border:1px solid transparent;background:transparent;color:#8899bb;cursor:pointer;transition:.15s;white-space:nowrap}
.nb:hover{background:#151c26;color:#e8eef8;border-color:#253044}
.nb.on{background:rgba(0,212,255,.1);color:#00d4ff;border-color:rgba(0,212,255,.3)}
.nb.or{color:#ff8c42}.nb.or:hover,.nb.or.on{background:rgba(255,140,66,0.1);color:#ff8c42;border-color:rgba(255,140,66,0.3)}
.nb.gr{color:#00ff88}.nb.gr:hover,.nb.gr.on{background:rgba(0,255,136,0.1);color:#00ff88;border-color:rgba(0,255,136,0.3)}
#clock{font-family:monospace;font-size:12px;color:#8899bb;padding:4px 10px;background:#0e1117;border:1px solid #1e2736;border-radius:6px}

#body{flex:1;overflow:hidden;display:flex;flex-direction:column}
.pn{display:none;flex:1;flex-direction:column;overflow:hidden}
.pn.on{display:flex}
.iframe-bar{height:40px;background:#0d1117;border-bottom:1px solid #1e2736;display:flex;align-items:center;padding:0 10px;gap:6px;flex-shrink:0}
.iurl{font-family:monospace;font-size:11px;color:#4a5568;flex:1}
iframe.full{flex:1;border:none;width:100%;height:100%}
.blob-btn{font-size:11px;font-weight:700;padding:0 12px;height:24px;border-radius:5px;border:1px solid rgba(0,212,255,.3);background:rgba(0,212,255,0.08);color:#00d4ff;cursor:pointer}
</style>
</head>
<body>

<div id="decoy">
  <div class="n">404</div>
  <p>Page not found.</p>
  <small>nginx/1.24.0</small>
</div>

<div id="warning-modal">
  <div class="w-card">
    <h2>⚠️ Terms of Use</h2>
    <p>"It is not my fault if you do misconduct with these features i am not held responible and your account will be terminated"</p>
    <div class="w-btns">
      <button class="w-btn w-ok" onclick="acceptWarning()">Continue</button>
      <button class="w-btn w-no" onclick="location.reload()">Cancel</button>
    </div>
  </div>
</div>

<div id="portal">
  <div id="nav">
    <span class="brand">WS://</span>
    <div class="sep"></div>
    <button class="nb on" id="nb-home" onclick="go('home')">🏠 Home</button>
    <button class="nb or" id="nb-yt" onclick="go('yt')">📺 YouTube</button>
    <button class="nb gr" id="nb-unblocker" onclick="go('unblocker')">🔓 Unblocker</button>
    <button class="nb" id="nb-games" onclick="go('games')">🎮 Games</button>
    <button class="nb" id="nb-editor" onclick="go('editor')">⌨ HTML</button>
    <div class="sp"></div>
    <div id="clock">00:00:00</div>
  </div>

  <div id="body">
    <div class="pn on" id="pn-home" style="padding:40px; text-align:center">
      <h1 style="font-size:40px; margin-bottom:10px">Private Portal</h1>
      <p style="color:#8899bb">Shortcut: <b>Ctrl + X</b></p>
    </div>

    <div class="pn" id="pn-yt">
      <div class="iframe-bar">
        <span class="iurl">YouTube Proxy</span>
        <button class="blob-btn" onclick="openBlob('https://yt.chocolatemoo53.com/watch?v=E7KBZzMrj5I')">🌐 Blob Tab</button>
      </div>
      <iframe class="full" id="yt-f" allow="autoplay; fullscreen"></iframe>
    </div>

    <div class="pn" id="pn-unblocker">
      <div class="iframe-bar"><span class="iurl">Unblocker</span></div>
      <iframe class="full" id="unblocker-f"></iframe>
    </div>

    <div class="pn" id="pn-games">
      <div class="iframe-bar"><span class="iurl">Games</span></div>
      <iframe class="full" id="games-f"></iframe>
    </div>

    <div class="pn" id="pn-editor">
        <div class="iframe-bar">
            <button class="blob-btn" onclick="runCode()">▶ Run Code</button>
        </div>
        <div style="display:flex; flex:1">
            <textarea id="code" style="flex:1; background:#060810; color:#fff; padding:15px; border:none; outline:none; font-family:monospace; resize:none"><!DOCTYPE html>
<html>
<body>
  <h1 style="color:cyan">Live HTML</h1>
  <p>Write code here.</p>
</body>
</html></textarea>
            <iframe id="preview" style="flex:1; background:#fff; border:none"></iframe>
        </div>
    </div>
  </div>
</div>

<script>
var framesReady = false;

// Shortcut Listener: Ctrl + X
document.addEventListener('keydown', function(e) {
    if (e.ctrlKey && e.key.toLowerCase() === 'x') {
        e.preventDefault(); // Stops browser "Cut" command
        const portal = document.getElementById('portal');
        
        if (portal.style.display === 'flex') {
            portal.style.display = 'none';
            document.getElementById('decoy').style.display = 'block';
        } else {
            document.getElementById('warning-modal').style.display = 'flex';
        }
    }
});

function acceptWarning() {
    document.getElementById('warning-modal').style.display = 'none';
    document.getElementById('decoy').style.display = 'none';
    document.getElementById('portal').style.display = 'flex';
    
    if (!framesReady) {
        framesReady = true;
        document.getElementById('yt-f').src = 'https://yt.chocolatemoo53.com/watch?v=E7KBZzMrj5I';
        document.getElementById('unblocker-f').src = 'https://ixlmath.nwpa.com.au';
        document.getElementById('games-f').src = 'https://calcsolver.github.io/';
    }
}

function go(id) {
    document.querySelectorAll('.pn').forEach(p => p.classList.remove('on'));
    document.querySelectorAll('.nb').forEach(b => b.classList.remove('on'));
    document.getElementById('pn-' + id).classList.add('on');
    const btn = document.getElementById('nb-' + id);
    if(btn) btn.classList.add('on');
}

function openBlob(url) {
    const html = `<html><body style="margin:0"><iframe src="${url}" style="width:100%;height:100vh;border:none" allowfullscreen></iframe></body></html>`;
    const blob = new Blob([html], {type: 'text/html'});
    window.open(URL.createObjectURL(blob), '_blank');
}

function runCode() {
    const code = document.getElementById('code').value;
    document.getElementById('preview').srcdoc = code;
}

setInterval(() => {
    document.getElementById('clock').textContent = new Date().toLocaleTimeString();
}, 1000);
</script>

</body>
</html>
